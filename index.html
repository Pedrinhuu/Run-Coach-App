/* ========== EXPORT FIT ========== */
function extrairMinutos(str) {
  if (!str) return null;
  const m = String(str).match(/(\d+)\s*min/i);
  return m ? parseInt(m[1], 10) : null;
}
function extrairTotalMinutos(str) {
  return extrairMinutos(str);
}
function extrairPaceRange(str) {
  if (!str) return { inicio: null, fim: null };
  const re = /(\d+)['′:](\d{2})["″]?\s*\/?\s*km\s*[-–a]\s*(\d+)['′:](\d{2})["″]?\s*\/?\s*km/i;
  const m = String(str).match(re);
  if (m) return { inicio: `${m[1]}:${m[2]}`, fim: `${m[3]}:${m[4]}` };
  const single = String(str).match(/(\d+)['′:](\d{2})["″]?\s*\/?\s*km/i);
  if (single) return { inicio: `${single[1]}:${single[2]}`, fim: `${single[1]}:${single[2]}` };
  return { inicio: null, fim: null };
}
function extrairVelocidadeRange(str) {
  if (!str) return { inicio: null, fim: null };
  const re = /(\d+[,.]?\d*)\s*[-–]\s*(\d+[,.]?\d*)\s*km\/h/i;
  const m = String(str).match(re);
  if (m) return { inicio: parseFloat(m[1].replace(',', '.')), fim: parseFloat(m[2].replace(',', '.')) };
  const single = String(str).match(/(\d+[,.]?\d*)\s*km\/h/i);
  if (single) { const v = parseFloat(single[1].replace(',', '.')); return { inicio: v, fim: v }; }
  return { inicio: null, fim: null };
}

function montarIntervalos(treino, modo) {
  const data = treino[modo];
  if (!data) return [];
  const totalMin = extrairTotalMinutos(data.duracao_total) || 0;
  const aqMin = extrairMinutos(data.aquecimento) || 5;
  const dqMin = extrairMinutos(data.desaquecimento) || 5;
  let principalMin = extrairMinutos(data.principal);
  if (!principalMin) principalMin = Math.max(0, totalMin - aqMin - dqMin);

  const intervalos = [];
  if (modo === 'rua') {
    intervalos.push({ tipo: 'aquecimento', duracao_min: aqMin, pace_min_km: null, velocidade_kmh: 5.0 });
    const pr = extrairPaceRange(data.principal);
    intervalos.push({
      tipo: 'treino', duracao_min: principalMin,
      pace_min_km_inicio: pr.inicio, pace_min_km_fim: pr.fim,
      velocidade_kmh_inicio: null, velocidade_kmh_fim: null,
    });
    intervalos.push({ tipo: 'relaxado', duracao_min: dqMin, pace_min_km: null, velocidade_kmh: 5.0 });
  } else {
    const aqV = extrairVelocidadeRange(data.aquecimento);
    const prV = extrairVelocidadeRange(data.principal);
    const dqV = extrairVelocidadeRange(data.desaquecimento);
    intervalos.push({ tipo: 'aquecimento', duracao_min: aqMin, pace_min_km: null, velocidade_kmh: aqV.inicio || 5.0 });
    intervalos.push({
      tipo: 'treino', duracao_min: principalMin,
      pace_min_km_inicio: null, pace_min_km_fim: null,
      velocidade_kmh_inicio: prV.inicio || 7.0, velocidade_kmh_fim: prV.fim || prV.inicio || 7.5,
    });
    intervalos.push({ tipo: 'relaxado', duracao_min: dqMin, pace_min_km: null, velocidade_kmh: dqV.inicio || 5.0 });
  }
  return intervalos.filter(iv => iv.duracao_min > 0);
}

/* ========== MODO "EM TREINO" ========== */
let workoutState = null;

function fmtClock(sec) {
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function extrairAlvoTexto(str, modo) {
  if (modo === 'rua') {
    const r = extrairPaceRange(str);
    if (r.inicio && r.fim) {
      const a = r.inicio.replace(':', "'") + '"';
      const b = r.fim.replace(':', "'") + '"';
      return r.inicio === r.fim ? `${a}/km` : `${a} – ${b}/km`;
    }
  } else {
    const v = extrairVelocidadeRange(str);
    if (v.inicio && v.fim) {
      const a = String(v.inicio).replace('.', ',');
      const b = String(v.fim).replace('.', ',');
      return v.inicio === v.fim ? `${a} km/h` : `${a} – ${b} km/h`;
    }
  }
  return null;
}

function falar(txt) {
  if (getSettings().mute) return;
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    u.rate = 1.0;
    u.pitch = 1.0;
    u.volume = 1.0;
    speechSynthesis.speak(u);
  } catch {}
}

let audioCtx = null;
function bip(times = 1, freq = 880) {
  if (getSettings().mute && times > 0) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    for (let i = 0; i < times; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const t0 = audioCtx.currentTime + i * 0.22;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(0.25, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
      osc.frequency.value = freq;
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.2);
    }
  } catch {}
}

function vibrar(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch {}
}

async function aquireWakeLock() {
  try { if ('wakeLock' in navigator) return await navigator.wakeLock.request('screen'); } catch {}
  return null;
}

function iniciarTreino(idx) {
  pedirPermissaoNotificacao();
  const w = getWeek();
  const t = w.treinos[idx];
  const modo = trainModeByIdx[idx] || 'rua';
  const data = t[modo];
  if (!data) { toast('Treino sem dados.', 'error'); return; }

  const aqMin = extrairMinutos(data.aquecimento) || 5;
  const dqMin = extrairMinutos(data.desaquecimento) || 5;
  const totalMin = extrairTotalMinutos(data.duracao_total) || 0;
  let principalMin = extrairMinutos(data.principal);
  if (!principalMin) principalMin = Math.max(1, totalMin - aqMin - dqMin);

  const intConfig = data.intervalos || null;
  let mainDur = principalMin * 60;
  if (intConfig && intConfig.ciclos && Array.isArray(intConfig.fases) && intConfig.fases.length > 0) {
    const cycleDur = intConfig.fases.reduce((a, f) => a + (f.duracao_segundos || 0), 0);
    mainDur = intConfig.ciclos * cycleDur;
  }

  const fases = [
    { nome: 'Aquecimento', dur: aqMin * 60, desc: data.aquecimento, alvo: extrairAlvoTexto(data.aquecimento, modo) || 'Caminhada leve', tipo: 'warmup' },
    { nome: 'Principal',   dur: mainDur, desc: data.principal,   alvo: extrairAlvoTexto(data.principal, modo)   || 'Ritmo do treino', tipo: 'main' },
    { nome: 'Desaquecimento', dur: dqMin * 60, desc: data.desaquecimento, alvo: extrairAlvoTexto(data.desaquecimento, modo) || 'Caminhada leve', tipo: 'cooldown' },
  ].filter(f => f.dur > 0);

  abrirWorkoutOverlay(t, idx, modo, fases, intConfig);
}

const ACTIVE_WORKOUT_KEY = 'runcoach_treino_ativo';

let notifTimers = [];
let notifPermission = Notification.permission || 'default';

async function pedirPermissaoNotificacao() {
  if (!('Notification' in window)) return;
  if (notifPermission === 'granted') return;
  if (notifPermission === 'denied') return;
  const result = await Notification.requestPermission();
  notifPermission = result;
}

async function mostrarNotificacao(titulo, corpo, tag) {
  if (notifPermission !== 'granted') return;
  if (document.visibilityState === 'visible') return;
  try {
    const reg = await navigator.serviceWorker.ready;
    reg.showNotification(titulo, {
      body: corpo,
      icon: '/manifest.json',
      badge: '/manifest.json',
      tag: tag || 'runcoach-fase',
      renotify: true,
      requireInteraction: false,
      silent: false,
    });
  } catch {}
}

function cancelarNotificacoesAgendadas() {
  notifTimers.forEach(id => clearTimeout(id));
  notifTimers = [];
}

function agendarNotificacoesFase(s) {
  cancelarNotificacoesAgendadas();
  if (notifPermission !== 'granted') return;
  if (!s || s.encerrado || s.pausedAt) return;

  const now = Date.now();
  const f = s.fases[s.faseIdx];

  if (f.tipo === 'main' && s.intv) {
    const iv = s.intv;
    const sf = iv.config.fases[iv.subFase];
    const subElapsed = (now - iv.subFaseStart - iv.subFasePausedAcc) / 1000;
    const subRestante = sf.duracao_segundos - subElapsed;

    if (subRestante > 5) {
      const t5 = setTimeout(() => {
        mostrarNotificacao('⏱️ 5 segundos', `Próxima sub-fase em 5s`, 'runcoach-aviso');
      }, (subRestante - 5) * 1000);
      notifTimers.push(t5);
    }

    const tEnd = setTimeout(() => {
      const nextSub = iv.subFase + 1;
      let msg;
      if (nextSub < iv.config.fases.length) {
        const proxSf = iv.config.fases[nextSub];
        msg = `${proxSf.nome} · ${proxSf.referencia} · Ciclo ${iv.ciclo + 1}`;
      } else if (iv.ciclo + 1 < iv.config.ciclos) {
        const proxSf = iv.config.fases[0];
        msg = `${proxSf.nome} · ${proxSf.referencia} · Ciclo ${iv.ciclo + 2}`;
      } else if (s.faseIdx < s.fases.length - 1) {
        msg = `Próxima fase: ${s.fases[s.faseIdx + 1].nome}`;
      } else {
        msg = 'Treino concluído!';
      }
      mostrarNotificacao('🏃 Troca de fase', msg, 'runcoach-fase');
    }, Math.max(0, subRestante) * 1000);
    notifTimers.push(tEnd);
  } else {
    const faseElapsed = (now - s.faseStart - s.pausedFaseAcc) / 1000;
    const restante = f.dur - faseElapsed;

    if (restante > 30 && s.faseIdx < s.fases.length - 1) {
      const t30 = setTimeout(() => {
        const prox = s.fases[s.faseIdx + 1];
        mostrarNotificacao('⏱️ 30 segundos', `Faltam 30s · Próxima: ${prox.nome}`, 'runcoach-aviso');
      }, (restante - 30) * 1000);
      notifTimers.push(t30);
    }

    const tEnd = setTimeout(() => {
      let msg;
      if (s.faseIdx < s.fases.length - 1) {
        const prox = s.fases[s.faseIdx + 1];
        msg = `${prox.nome} · ${prox.alvo}`;
      } else {
        msg = 'Treino concluído! Bom trabalho!';
      }
      mostrarNotificacao('🏃 Troca de fase', msg, 'runcoach-fase');
    }, Math.max(0, restante) * 1000);
    notifTimers.push(tEnd);
  }
}

function saveActiveWorkout() {
  if (!workoutState || workoutState.encerrado) return;
  const s = workoutState;
  const data = {
    treinoIdx: s.treinoIdx,
    workoutStart: s.workoutStart,
    faseIdx: s.faseIdx,
    faseStart: s.faseStart,
    pausedAcc: s.pausedAcc,
    pausedFaseAcc: s.pausedFaseAcc,
    pausedAt: s.pausedAt,
    avisou30: s.avisou30,
    fasesConfig: s.fases.map(f => ({ nome: f.nome, dur: f.dur, desc: f.desc, alvo: f.alvo, tipo: f.tipo })),
    modo: s.modo,
    treinoTipo: s.treinoTipo,
    intv: s.intv ? {
      config: s.intv.config,
      ciclo: s.intv.ciclo,
      subFase: s.intv.subFase,
      subFaseStart: s.intv.subFaseStart,
      subFasePausedAcc: s.intv.subFasePausedAcc,
      avisou5: s.intv.avisou5,
    } : null,
  };
  localStorage.setItem(ACTIVE_WORKOUT_KEY, JSON.stringify(data));
}

function clearActiveWorkout() {
  localStorage.removeItem(ACTIVE_WORKOUT_KEY);
}

function getActiveWorkout() {
  try { const v = localStorage.getItem(ACTIVE_WORKOUT_KEY); return v ? JSON.parse(v) : null; } catch { return null; }
}

function onVisibility() {
  if (!workoutState) return;
  if (document.visibilityState === 'visible') {
    cancelarNotificacoesAgendadas();
    if (workoutState.wakeLock === null) {
      aquireWakeLock().then(wl => { if (workoutState) workoutState.wakeLock = wl; });
    }
    if (workoutState.rafId) cancelAnimationFrame(workoutState.rafId);
    tick();
  } else {
    agendarNotificacoesFase(workoutState);
  }
}

function iniciarFase(idx, inicial = false) {
  const s = workoutState;
  const f = s.fases[idx];
  s.faseIdx = idx;
  s.faseStart = Date.now();
  s.pausedFaseAcc = 0;
  s.avisou30 = false;

  const dots = s.overlay.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.classList.toggle('done', i < idx);
    d.classList.toggle('current', i === idx);
  });

  s.overlay.querySelector('#wPhaseLbl').textContent = `FASE ${idx + 1} DE ${s.fases.length}`;
  const pn = s.overlay.querySelector('#wPhaseName');
  pn.textContent = f.nome;
  pn.classList.toggle('principal', f.tipo === 'main');
  s.overlay.querySelector('#wAlvo').textContent = f.alvo;
  s.overlay.querySelector('#wDesc').textContent = f.desc;

  if (f.tipo === 'main' && s.intv) {
    s.intv.ciclo = 0;
    s.intv.subFase = 0;
    s.intv.subFaseStart = Date.now();
    s.intv.subFasePausedAcc = 0;
    s.intv.avisou5 = false;
    s.overlay.querySelector('#wIntInfo').style.display = 'block';
    atualizarIntervaloUI(s);
  } else {
    s.overlay.querySelector('#wIntInfo').style.display = 'none';
  }

  if (inicial) {
    bip(2, 880);
    vibrar([180, 80, 180]);
    if (f.tipo === 'main' && s.intv) {
      const sf = s.intv.config.fases[0];
      falar(`Iniciando intervalos. ${sf.nome}. ${sf.referencia}. ${s.intv.config.ciclos} ciclos.`);
    } else {
      falar(`Iniciando ${f.nome}. ${f.alvo}. ${Math.round(f.dur / 60)} minutos.`);
    }
  } else {
    bip(3, 1000);
    vibrar([220, 100, 220, 100, 220]);
    if (f.tipo === 'main' && s.intv) {
      const sf = s.intv.config.fases[0];
      falar(`Próxima fase: Intervalos. ${sf.nome}. ${sf.referencia}.`);
    } else {
      falar(`Próxima fase: ${f.nome}. ${f.alvo}.`);
    }
  }
  saveActiveWorkout();
  agendarNotificacoesFase(s);
}

function atualizarIntervaloUI(s) {
  const iv = s.intv;
  const cfg = iv.config;
  const sf = cfg.fases[iv.subFase];
  const isLast = iv.ciclo === cfg.ciclos - 1;
  const isPenultimate = iv.ciclo === cfg.ciclos - 2;

  const pn = s.overlay.querySelector('#wPhaseName');
  pn.textContent = sf.nome;
  pn.classList.add('principal');
  s.overlay.querySelector('#wAlvo').textContent = sf.referencia || '—';
  s.overlay.querySelector('#wDesc').textContent = `Fase ${iv.subFase + 1} de ${cfg.fases.length}`;

  const cycleEl = s.overlay.querySelector('#wIntCycle');
  cycleEl.textContent = isLast ? `ÚLTIMO CICLO (${iv.ciclo + 1}/${cfg.ciclos})` :
    isPenultimate ? `Ciclo ${iv.ciclo + 1} de ${cfg.ciclos} · Último ciclo a seguir` :
    `Ciclo ${iv.ciclo + 1} de ${cfg.ciclos}`;
  cycleEl.classList.toggle('last', isLast);

  s.overlay.querySelector('#wIntPhase').textContent = `${sf.nome} · ${fmtClock(sf.duracao_segundos)}`;
}

function avancarSubFase(s) {
  const iv = s.intv;
  const cfg = iv.config;
  const nextSub = iv.subFase + 1;

  if (nextSub < cfg.fases.length) {
    iv.subFase = nextSub;
  } else {
    iv.ciclo++;
    if (iv.ciclo >= cfg.ciclos) {
      return false;
    }
    iv.subFase = 0;
  }
  iv.subFaseStart = Date.now();
  iv.subFasePausedAcc = 0;
  iv.avisou5 = false;

  const sf = cfg.fases[iv.subFase];
  bip(2, 1000);
  vibrar([180, 80, 180]);
  falar(`${sf.nome}. ${sf.referencia}. Ciclo ${iv.ciclo + 1}.`);

  atualizarIntervaloUI(s);
  saveActiveWorkout();
  agendarNotificacoesFase(s);
  return true;
}

function tick() {
  if (!workoutState || workoutState.encerrado) return;
  const s = workoutState;
  if (!s.pausedAt) {
    const now = Date.now();
    const totalElapsed = (now - s.workoutStart - s.pausedAcc) / 1000;
    const f = s.fases[s.faseIdx];

    if (f.tipo === 'main' && s.intv) {
      const iv = s.intv;
      const sf = iv.config.fases[iv.subFase];
      const subElapsed = (now - iv.subFaseStart - iv.subFasePausedAcc) / 1000;
      const subRestante = sf.duracao_segundos - subElapsed;
      const faseElapsed = (now - s.faseStart - s.pausedFaseAcc) / 1000;

      s.overlay.querySelector('#wTimer').textContent = fmtClock(subRestante);
      const timerEl = s.overlay.querySelector('#wTimer');
      timerEl.classList.toggle('warn', subRestante > 0 && subRestante <= 5);
      s.overlay.querySelector('#wPhaseFill').style.width = Math.min(100, (faseElapsed / f.dur) * 100) + '%';
      s.overlay.querySelector('#wTotal').textContent = fmtClock(totalElapsed);
      s.overlay.querySelector('#wIntTotal').textContent = `Total principal: ${fmtClock(faseElapsed)} / ${fmtClock(f.dur)}`;

      if (!iv.avisou5 && subRestante <= 5 && subRestante > 3) {
        iv.avisou5 = true;
        bip(1, 660);
        vibrar(120);
      }

      if (subRestante <= 0) {
        if (!avancarSubFase(s)) {
          if (s.faseIdx < s.fases.length - 1) {
            iniciarFase(s.faseIdx + 1);
          } else {
            return encerrarTreino(false);
          }
        }
      }
    } else {
      const faseElapsed = (now - s.faseStart - s.pausedFaseAcc) / 1000;
      const restante = f.dur - faseElapsed;

      s.overlay.querySelector('#wTimer').textContent = fmtClock(restante);
      const timerEl = s.overlay.querySelector('#wTimer');
      timerEl.classList.toggle('warn', restante > 0 && restante <= 5);
      s.overlay.querySelector('#wPhaseFill').style.width = Math.min(100, (faseElapsed / f.dur) * 100) + '%';
      s.overlay.querySelector('#wTotal').textContent = fmtClock(totalElapsed);

      if (!s.avisou30 && restante <= 30 && restante > 25 && s.faseIdx < s.fases.length - 1) {
        s.avisou30 = true;
        const prox = s.fases[s.faseIdx + 1];
        bip(1, 660);
        vibrar(120);
        falar(`Faltam 30 segundos. Próxima: ${prox.nome}.`);
      }

      if (restante <= 0) {
        if (s.faseIdx < s.fases.length - 1) {
          iniciarFase(s.faseIdx + 1);
        } else {
          return encerrarTreino(false);
        }
      }
    }
  }
  workoutState.rafId = requestAnimationFrame(tick);
}

function togglePause() {
  const s = workoutState;
  if (!s) return;
  const btn = s.overlay.querySelector('#wPause');
  if (s.pausedAt) {
    const diff = Date.now() - s.pausedAt;
    s.pausedAcc += diff;
    s.pausedFaseAcc += diff;
    if (s.intv) s.intv.subFasePausedAcc += diff;
    s.pausedAt = null;
    btn.textContent = 'Pausar';
    falar('Retomado');
    agendarNotificacoesFase(s);
  } else {
    s.pausedAt = Date.now();
    btn.textContent = 'Retomar';
    falar('Pausado');
    cancelarNotificacoesAgendadas();
  }
  saveActiveWorkout();
}

function pularFase() {
  const s = workoutState;
  if (!s) return;
  const f = s.fases[s.faseIdx];
  if (f.tipo === 'main' && s.intv) {
    if (!avancarSubFase(s)) {
      if (s.faseIdx < s.fases.length - 1) {
        iniciarFase(s.faseIdx + 1);
      } else {
        encerrarTreino(false);
      }
    }
    return;
  }
  if (s.faseIdx < s.fases.length - 1) {
    iniciarFase(s.faseIdx + 1);
  } else {
    encerrarTreino(false);
  }
}

function encerrarTreino(cancelado) {
  const s = workoutState;
  if (!s || s.encerrado) return;
  s.encerrado = true;
  cancelarNotificacoesAgendadas();
  try { speechSynthesis.cancel(); } catch {}
  clearActiveWorkout();
  if (s.rafId) cancelAnimationFrame(s.rafId);
  if (s.wakeLock) { try { s.wakeLock.release(); } catch {} }
  document.removeEventListener('visibilitychange', onVisibility);

  if (cancelado) {
    s.overlay.remove();
    workoutState = null;
    toast('Treino interrompido', 'error');
    return;
  }

  bip(4, 1200);
  vibrar([300, 150, 300, 150, 600]);
  falar('Treino concluído. Bom trabalho!');
  s.overlay.classList.add('done');
  s.overlay.querySelector('#wTimer').textContent = '00:00';
  s.overlay.querySelector('#wPhaseName').textContent = 'Concluído ✓';
  s.overlay.querySelector('#wAlvo').textContent = '—';
  s.overlay.querySelector('#wDesc').textContent = 'Pronto para registrar o treino';

  const ctrls = s.overlay.querySelector('.controls');
  ctrls.innerHTML = `
    <button class="ctrl-btn primary" id="wRegistrar">Registrar treino agora</button>
    <button class="ctrl-btn" id="wFechar">Fechar</button>
  `;
  const idx = s.treinoIdx;
  ctrls.querySelector('#wRegistrar').addEventListener('click', () => {
    s.overlay.remove();
    workoutState = null;
    openLogModal(idx);
  });
  ctrls.querySelector('#wFechar').addEventListener('click', () => {
    s.overlay.remove();
    workoutState = null;
  });
}

function resetarApp() {
  if (!confirm('Apagar TODOS os dados do app (semana, histórico, corridas, métricas)? Esta ação não pode ser desfeita.')) return;
  if (!confirm('Tem certeza? Os dados serão apagados permanentemente deste celular.')) return;
  Object.values(KEYS).forEach(k => localStorage.removeItem(k));
  location.reload();
}

function exportBackup() {
  const BACKUP_KEYS = [
    KEYS.week, KEYS.logs, KEYS.history, KEYS.races,
    AVALIACAO_KEY, SETTINGS_KEY, ACTIVE_WORKOUT_KEY, VERSION_KEY
  ];
  const lerChave = (chave) => {
    const raw = localStorage.getItem(chave);
    if (raw === null) return null;
    try { return JSON.parse(raw); } catch (e) { return raw; }
  };
  const data = {};
  BACKUP_KEYS.forEach(k => {
    const v = lerChave(k);
    if (v !== null) data[k] = v;
  });
  const blob = new Blob([JSON.stringify({
    _backup: 'runcoach_daily',
    _version: APP_VERSION,
    _date: new Date().toISOString(),
    data
  }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `runcoach_backup_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Backup exportado!');
}

function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const json = JSON.parse(ev.target.result);
        if (!json._backup || json._backup !== 'runcoach_daily' || !json.data) {
          toast('Arquivo inválido — não é um backup do Run Coach.', 'error');
          return;
        }
        const keys = Object.keys(json.data);
        const forbidden = keys.filter(k => k === 'runcoach_intervals_key');
        if (forbidden.length) {
          toast('Backup contém chave de API — import bloqueado.', 'error');
          return;
        }
        const dataStr = json._date ? ` de ${new Date(json._date).toLocaleDateString('pt-BR')}` : '';
        const ver = json._version ? ` (v${json._version})` : '';
        if (!confirm(`Restaurar backup${ver}${dataStr}?\n\nIsso substituirá TODOS os dados atuais (exceto chave de API do Intervals.icu).\n\nEsta ação não pode ser desfeita.`)) return;
        const BACKUP_KEYS = [
          KEYS.week, KEYS.logs, KEYS.history, KEYS.races,
          AVALIACAO_KEY, SETTINGS_KEY, ACTIVE_WORKOUT_KEY, VERSION_KEY
        ];
        BACKUP_KEYS.forEach(k => localStorage.removeItem(k));
        Object.entries(json.data).forEach(([k, v]) => {
          if (k !== 'runcoach_intervals_key') {
            localStorage.setItem(k, JSON.stringify(v));
          }
        });
        toast('Backup restaurado! Recarregando…');
        setTimeout(() => location.reload(), 800);
      } catch (err) {
        toast('Erro ao ler o arquivo: ' + err.message, 'error');
      }
    };

/* ========== MODAL: COPIAR PARA ZEPP ========== */
async function copiarTexto(txt, btn) {
  try {
    await navigator.clipboard.writeText(txt);
    if (btn) {
      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = '✓ Copiado';
      setTimeout(() => { btn.disabled = false; btn.textContent = orig; }, 1500);
    }
  } catch {
    try {
      const ta = document.createElement('textarea');
      ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
      if (btn) {
        const orig = btn.textContent;
        btn.textContent = '✓ Copiado';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      }
    } catch {
      toast('Não foi possível copiar', 'error');
    }
  }
}

function openCopyModal(idx) {
  const w = getWeek();
  const t = w.treinos[idx];
  const modo = trainModeByIdx[idx] || 'rua';
  const data = t[modo];
  if (!data) { toast('Treino sem dados para copiar.', 'error'); return; }
  const aqMin = extrairMinutos(data.aquecimento) || 5;
  const dqMin = extrairMinutos(data.desaquecimento) || 5;
  const totalMin = extrairTotalMinutos(data.duracao_total) || 0;
  let principalMin = extrairMinutos(data.principal);
  if (!principalMin) principalMin = Math.max(1, totalMin - aqMin - dqMin);

  const alvoPrincipal = extrairAlvoTexto(data.principal, modo) || '';
  const fmtMin = (n) => `${String(Math.floor(n)).padStart(2,'0')}:00`;

  const linhas = [
    { lbl: 'Nome', val: t.tipo },
    { lbl: 'Nota', val: t.objetivo || '' },
    { lbl: `Aquecimento (${fmtMin(aqMin)})`, val: data.aquecimento },
    { lbl: `Treino (${fmtMin(principalMin)})`, val: alvoPrincipal ? `Alerta de ritmo: ${alvoPrincipal}` : data.principal },
    { lbl: `Relaxado (${fmtMin(dqMin)})`, val: data.desaquecimento },
  ];

  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  back.innerHTML = `<div class="modal">
    <h2>Copiar para Zepp</h2>
    <p class="muted" style="font-size:12px;margin-bottom:12px">Toque em <strong>Copiar</strong> e cole no campo correspondente do app Zepp.</p>

  back.querySelectorAll('[data-copy-i]').forEach(b => {

function dayOfYear(d) {
  d = d || new Date();
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}
function fraseDoDia() { return FRASES_MOTIVACIONAIS[dayOfYear() % FRASES_MOTIVACIONAIS.length]; }
function versiculoDoDia() { return VERSICULOS[dayOfYear() % VERSICULOS.length]; }
function saudacao() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia';
  if (h < 18) return 'Boa tarde';
  return 'Boa noite';
}
function dataExtensa() {
  const d = new Date();
  const s = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  return s.charAt(0).toUpperCase() + s.slice(1);
}

let dailyRefreshTimer = null;
function scheduleDailyRefresh() {
  if (dailyRefreshTimer) clearTimeout(dailyRefreshTimer);
  const now = new Date();
  const next = new Date(now);
  next.setDate(now.getDate() + 1);
  next.setHours(0, 0, 0, 0);
  const ms = next - now + 2000;
  dailyRefreshTimer = setTimeout(() => {
    render();
    scheduleDailyRefresh();
  }, ms);
}

/* ========== WHEEL PICKER ========== */
function openPicker({ title, subtitle, columns, separators = [], onConfirm }) {
  const back = document.createElement('div');
  back.className = 'picker-backdrop';
  let colsHtml = '';
  columns.forEach((c, i) => {
    if (i > 0) colsHtml += `<div class="picker-sep">${separators[i-1] ?? ''}</div>`;
    colsHtml += `<div class="picker-col" data-col="${i}">
      <div class="picker-col-pad"></div>
      ${c.items.map(it => `<div class="picker-item">${escapeHtml(String(it))}</div>`).join('')}
      <div class="picker-col-pad"></div>
    </div>`;
  });
  back.innerHTML = `<div class="picker-sheet">
    <div class="picker-title">${escapeHtml(title || '')}</div>
    ${subtitle ? `<div class="picker-sub">${escapeHtml(subtitle)}</div>` : ''}
    <div class="picker-cols">${colsHtml}</div>
    <div class="picker-actions">
      <button class="btn" id="pkOk">OK</button>
      <button class="btn outline" id="pkCancel">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(back);

  const colEls = back.querySelectorAll('.picker-col');
  const ITEM_H = 40;

  function updateSelected(col) {
    const idx = Math.round(col.scrollTop / ITEM_H);
    col.querySelectorAll('.picker-item').forEach((it, i) => {
      it.classList.toggle('selected', i === idx);
    });
  }

  colEls.forEach((col, i) => {
    const initial = Math.max(0, Math.min((columns[i].items.length - 1), columns[i].initial || 0));
    requestAnimationFrame(() => {
      col.scrollTop = initial * ITEM_H;
      updateSelected(col);
    });
    let t;
    col.addEventListener('scroll', () => {
      clearTimeout(t);
      t = setTimeout(() => {
        const idx = Math.round(col.scrollTop / ITEM_H);
        col.scrollTop = idx * ITEM_H;
        updateSelected(col);
      }, 80);
    });
    col.addEventListener('click', (e) => {
      const item = e.target.closest('.picker-item');
      if (!item) return;
      const items = Array.from(col.querySelectorAll('.picker-item'));
      const idx = items.indexOf(item);
      if (idx >= 0) col.scrollTop = idx * ITEM_H;
    });
  });

  back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
  back.querySelector('#pkCancel').addEventListener('click', () => back.remove());
  back.querySelector('#pkOk').addEventListener('click', () => {
    const selected = Array.from(colEls).map(col => Math.round(col.scrollTop / ITEM_H));
    back.remove();
    onConfirm(selected);
  });
}

const MESES_PT = ['JAN.','FEV.','MAR.','ABR.','MAI.','JUN.','JUL.','AGO.','SET.','OUT.','NOV.','DEZ.'];

function openDatePicker(isoDate, onConfirm) {
  const base = isoDate ? new Date(isoDate + 'T12:00:00') : new Date();
  const curY = base.getFullYear();
  const years = [];
  for (let y = curY - 3; y <= curY + 5; y++) years.push(y);
  const days = [];
  for (let d = 1; d <= 31; d++) days.push(String(d).padStart(2, '0'));
  openPicker({
    title: 'Data',
    columns: [
      { items: days, initial: base.getDate() - 1 },
      { items: MESES_PT, initial: base.getMonth() },
      { items: years.map(String), initial: years.indexOf(curY) },
    ],
    onConfirm: ([di, mi, yi]) => {
      const yr = years[yi];
      const dt = String(di + 1).padStart(2, '0');
      const mo = String(mi + 1).padStart(2, '0');
      onConfirm(`${yr}-${mo}-${dt}`);
    }
  });
}

function openPacePicker(currentSec, onConfirm) {
  const mins = []; for (let m = 3; m <= 12; m++) mins.push(String(m));
  const secs = []; for (let s = 0; s < 60; s++) secs.push(String(s).padStart(2, '0'));
  let m0 = 7, s0 = 0;
  if (currentSec && currentSec > 0) { m0 = Math.floor(currentSec / 60); s0 = currentSec % 60; }
  openPicker({
    title: 'Pace por km',
    columns: [
      { items: mins, initial: Math.max(0, mins.indexOf(String(m0))) },
      { items: secs, initial: s0 },
    ],
    separators: ["'"],
    onConfirm: ([mi, si]) => {
      const m = parseInt(mins[mi]), s = parseInt(secs[si]);
      onConfirm({ seconds: m * 60 + s, text: `${m}'${String(s).padStart(2,'0')}"` });
    }
  });
}

function openTempoPicker(currentSec, onConfirm) {
  const hours = []; for (let h = 0; h <= 5; h++) hours.push(String(h));
  const mins = []; for (let m = 0; m < 60; m++) mins.push(String(m).padStart(2, '0'));
  const secs = []; for (let s = 0; s < 60; s++) secs.push(String(s).padStart(2, '0'));
  let h0 = 0, m0 = 30, s0 = 0;
  if (currentSec && currentSec > 0) {
    h0 = Math.floor(currentSec / 3600);
    m0 = Math.floor((currentSec % 3600) / 60);
    s0 = currentSec % 60;
  }
  openPicker({
    title: 'Tempo (h : min : seg)',
    columns: [
      { items: hours, initial: h0 },
      { items: mins, initial: m0 },
      { items: secs, initial: s0 },
    ],
    separators: [':', ':'],
    onConfirm: ([hi, mi, si]) => {
      const h = parseInt(hours[hi]), m = parseInt(mins[mi]), s = parseInt(secs[si]);
      const total = h * 3600 + m * 60 + s;
      onConfirm({ seconds: total, text: fmtTempoInput(total) });
    }
  });
}

function openDistPicker(currentKm, onConfirm) {
  const ints = []; for (let i = 0; i <= 50; i++) ints.push(String(i));
  const decs = []; for (let d = 0; d < 100; d++) decs.push(String(d).padStart(2, '0'));
  let i0 = 0, d0 = 0;
  if (currentKm) { i0 = Math.floor(currentKm); d0 = Math.round((currentKm - i0) * 100); }
  openPicker({
    title: 'Distância (km)',
    columns: [
      { items: ints, initial: i0 },
      { items: decs, initial: d0 },
    ],
    separators: ['.'],
    onConfirm: ([ii, di]) => {
      const km = parseInt(ints[ii]) + parseInt(decs[di]) / 100;
      onConfirm(km);
    }
  });
}

function pickerInputHtml(id, value, placeholder) {
  return `<div class="picker-input" id="${id}" data-value="${escapeHtml(value || '')}">
    <span class="${value ? '' : 'ph'}" data-display>${escapeHtml(value || placeholder || '—')}</span>
    <span class="chev">▾</span>
  </div>`;
}
function pickerInputSet(el, value, display) {
  el.dataset.value = value || '';
  const d = el.querySelector('[data-display]');
  if (value) { d.textContent = display || value; d.classList.remove('ph'); }
  else { d.textContent = el.dataset.placeholder || '—'; d.classList.add('ph'); }
}

/* ========== SYNC: status de treinos vs logs ========== */
function sincronizarStatusTreinos() {
  const logs = getLogs();
  const w = getWeek();
  if (!w || !Array.isArray(w.treinos)) return;
  let mudou = false;
  w.treinos.forEach((t, idx) => {
    if (t.status === 'Concluído') {
      const tem = logs.some(l => l.semana === w.semana_atual && l.train_idx === idx);
      if (!tem) {
        t.status = 'Pendente';
        delete t.data_efetiva;
        mudou = true;
      }
    }
  });
  if (mudou) setWeek(w);

  const hist = getHistory();
  let mudouHist = false;
  hist.forEach(sw => {
    (sw.treinos || []).forEach((t, idx) => {
      if (t.status === 'Concluído') {
        const tem = logs.some(l => l.semana === sw.semana_atual && l.train_idx === idx);
        if (!tem) {
          t.status = 'Pendente';
          delete t.data_efetiva;
          mudouHist = true;
        }
      }
    });
  });
  if (mudouHist) setHistory(hist);
}

/* ========== VERSION CHECK (SININHO) ========== */
const VERSION_KEY = 'runcoach_versao';
let pendingUpdate = null;
let pendingVersionInfo = null;
let currentVersionInfo = null;

async function checkVersionJson() {
  try {
    const res = await fetch('/version.json', { cache: 'no-store' });
    if (!res.ok) return;
    const info = await res.json();
    currentVersionInfo = info;
    const saved = localStorage.getItem(VERSION_KEY);
    if (!saved) {
      localStorage.setItem(VERSION_KEY, info.versao);
      return;
    }
    if (info.versao !== saved) {
      pendingVersionInfo = info;
      showBellDot();
    }
  } catch {}
}

function showBellDot() {
  document.querySelectorAll('#bellDot').forEach(el => el.style.display = 'flex');
}

function hideBellDot() {
  document.querySelectorAll('#bellDot').forEach(el => el.style.display = 'none');
}

async function openUpdateModal() {
  try {
    const res = await fetch('/version.json', { cache: 'no-store' });
    if (res.ok) currentVersionInfo = await res.json();
  } catch {}
  if (pendingVersionInfo) {
    openUpdateAvailableModal();
  } else {
    openUpToDateModal();
  }
}

function openUpToDateModal() {
  const info = currentVersionInfo;
  const savedVer = localStorage.getItem(VERSION_KEY) || APP_VERSION;
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  const novidades = info && info.novidades ? info.novidades.map(n => `<li>${escapeHtml(n)}</li>`).join('') : '';
  back.innerHTML = `<div class="modal" style="padding:20px">
    <h2 style="margin-bottom:4px">Versão atual</h2>
    <div class="muted" style="font-size:13px;margin-bottom:12px">v${escapeHtml(info ? info.versao : savedVer)}${info && info.data ? ' · ' + fmtDateBR(info.data) : ''}</div>
    <div style="font-size:15px;margin-bottom:14px">Você já está com a versão mais recente 🎉</div>
    ${novidades ? `<div style="margin-bottom:14px">
      <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px">Novidades desta versão</div>
      <ul style="padding-left:18px;font-size:14px;line-height:1.6">${novidades}</ul>
    </div>` : ''}
    <button class="btn" id="updateCloseBtn">Fechar</button>
    <button class="btn outline" id="clearCacheBtn" style="margin-top:8px;color:var(--muted);border-color:var(--border);font-size:13px">Limpar cache e recarregar</button>
    <div id="clearCacheConfirm" style="display:none;margin-top:10px;padding:12px;background:var(--bg2);border-radius:8px;text-align:center">
      <div style="font-size:13px;margin-bottom:10px">Isso vai recarregar o app e limpar o cache. Continuar?</div>
      <div class="row" style="justify-content:center;gap:10px">
        <button class="btn" id="clearCacheYes" style="font-size:13px;padding:8px 16px">Sim, limpar</button>
        <button class="btn outline" id="clearCacheNo" style="font-size:13px;padding:8px 16px">Cancelar</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(back);
  back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
  back.querySelector('#updateCloseBtn').addEventListener('click', () => back.remove());
  back.querySelector('#clearCacheBtn').addEventListener('click', () => {
    back.querySelector('#clearCacheConfirm').style.display = 'block';
    back.querySelector('#clearCacheBtn').style.display = 'none';
  });
  back.querySelector('#clearCacheNo').addEventListener('click', () => {
    back.querySelector('#clearCacheConfirm').style.display = 'none';
    back.querySelector('#clearCacheBtn').style.display = '';
  });
  back.querySelector('#clearCacheYes').addEventListener('click', () => limparCacheERecarregar());
}

async function limparCacheERecarregar() {
  if ('caches' in window) {
    const cacheKeys = await caches.keys();
    await Promise.all(cacheKeys.map(key => caches.delete(key)));
  }
  if ('serviceWorker' in navigator) {
    const registration = await navigator.serviceWorker.ready;
    if (registration.waiting) {
      registration.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
  }
  location.reload(true);
}

function openUpdateAvailableModal() {
  const info = pendingVersionInfo;
  if (!info) return;
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  const novidades = (info.novidades || []).map(n => `<li>${escapeHtml(n)}</li>`).join('');
  back.innerHTML = `<div class="modal" style="padding:20px">
    <h2 style="margin-bottom:4px">Nova versão disponível</h2>
    <div class="muted" style="font-size:13px;margin-bottom:12px">v${escapeHtml(info.versao)} · ${info.data ? fmtDateBR(info.data) : ''}</div>
    <div style="margin-bottom:14px">
      <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px">Novidades</div>
      <ul style="padding-left:18px;font-size:14px;line-height:1.6">${novidades || '<li>Melhorias e correções</li>'}</ul>
    </div>
    <button class="btn" id="updateNowBtn" style="margin-bottom:8px">Atualizar agora</button>
    <button class="btn outline" id="updateLaterBtn">Depois</button>
  </div>`;
  document.body.appendChild(back);
  back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
  back.querySelector('#updateLaterBtn').addEventListener('click', () => back.remove());
  back.querySelector('#updateNowBtn').addEventListener('click', () => {
    back.remove();
    doUpdate();
  });
}

function doUpdate() {
  if (pendingUpdate) {
    pendingUpdate.postMessage({ type: 'SKIP_WAITING' });
    return;
  }
  caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
    if (pendingVersionInfo) localStorage.setItem(VERSION_KEY, pendingVersionInfo.versao);
    location.reload();
  });
}

/* ========== INIT ========== */
(function startupRecovery() {
  const chaves = [KEYS.week, AVALIACAO_KEY, SETTINGS_KEY, KEYS.logs, KEYS.history, KEYS.races];
  for (const k of chaves) {
    try {
      const v = localStorage.getItem(k);
      if (v) JSON.parse(v);
    } catch (e) {
      console.error('Dado corrompido detectado em ' + k + ', limpando:', e);
      localStorage.removeItem(k);
    }
  }
})();
try {
  applyTheme(getSettings().theme);
  sincronizarStatusTreinos();
  render();
} catch (e) {
  console.error('Erro crítico na inicialização:', e);
  try { localStorage.removeItem(KEYS.week); } catch (_) {}
  try {
    document.getElementById('content').innerHTML = `
      <div class="card alert-red" style="margin-top:20px;text-align:center">
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">Erro ao carregar</div>
        <div style="font-size:14px;line-height:1.5;margin-bottom:12px">Ocorreu um erro ao carregar os dados. A semana atual foi redefinida, mas seu histórico e logs foram preservados.</div>
        <button class="btn" onclick="location.reload()">Recarregar app</button>
      </div>`;
  } catch (_) { document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif"><h2>Erro ao carregar</h2><p>Recarregue a página.</p><button onclick="location.reload()">Recarregar</button></div>'; }
}
scheduleDailyRefresh();
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            pendingUpdate = newSW;
            checkVersionJson();
          }
        });
      });
    }).catch(() => {});
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (pendingVersionInfo) localStorage.setItem(VERSION_KEY, pendingVersionInfo.versao);
      location.reload();
    });
  });
}
checkVersionJson();
</script>
