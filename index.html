<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FF5C00" />
<title>Run Coach Daily</title>
<link rel="manifest" href="/manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#FFFFFF; --bg2:#F5F5F5; --accent:#FF5C00; --text:#1A1A1A;
    --muted:#666; --green:#00C853; --red:#D32F2F; --yellow:#F9A825;
    --border:#E5E5E5; --card:#FFFFFF; --modal:#FFFFFF;
    --alert-red-bg:#FEF1F1; --alert-green-bg:#F0FBF3;
    --badge-muted-bg:#F5F5F5; --badge-green-bg:#E0F7E9;
    --badge-orange-bg:#FFE9D9; --badge-red-bg:#FCE0E0; --badge-yellow-bg:#FFF4D1;
    --blue:#1976D2; --badge-blue-bg:#E3F0FC;
  }
  [data-theme="dark"]{
    --bg:#0E0E0E; --bg2:#1A1A1A; --text:#F2F2F2; --muted:#9A9A9A;
    --border:#2A2A2A; --card:#161616; --modal:#1C1C1C;
    --alert-red-bg:#2A1414; --alert-green-bg:#0F2418;
    --badge-muted-bg:#222; --badge-green-bg:#163322;
    --badge-orange-bg:#3A1F0A; --badge-red-bg:#3A1414; --badge-yellow-bg:#3A2E0A;
    --blue:#64B5F6; --badge-blue-bg:#0D2744;
    color-scheme:dark;
  }
  [data-theme="dark"] .card{background:var(--card)}
  [data-theme="dark"] .modal{background:var(--modal)}
  [data-theme="dark"] .field input,
  [data-theme="dark"] .field textarea,
  [data-theme="dark"] .field select{background:#222;color:var(--text);border-color:var(--border)}
  [data-theme="dark"] .radio-row label{background:#222;color:var(--text)}
  [data-theme="dark"] .btn.outline{background:transparent;color:var(--text);border-color:var(--border)}
  [data-theme="dark"] .toggle{background:#222}
  [data-theme="dark"] .toggle button.active{background:#333;color:var(--text)}
  [data-theme="dark"] .bottom-nav{background:var(--card);border-top-color:var(--border)}
  [data-theme="dark"] .help-btn{background:#222;color:var(--text);border-color:var(--border)}
  [data-theme="dark"] .progress-bar-top{background:#222}
  [data-theme="dark"] .history-item{background:var(--card);border-color:var(--border)}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;justify-content:center}
  .app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;position:relative;background:var(--bg)}
  .progress-bar-top{position:sticky;top:0;left:0;right:0;height:4px;background:var(--bg2);z-index:50}
  .progress-bar-top .fill{height:100%;background:var(--accent);transition:width .4s}
  .content{flex:1;padding:16px 16px 96px}
  .num{font-weight:600;font-variant-numeric:tabular-nums}
  h1{font-size:22px;font-weight:700;line-height:1.2}
  h2{font-size:18px;font-weight:700}
  h3{font-size:15px;font-weight:700}
  .muted{color:var(--muted);font-size:13px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:8px;font-weight:600;font-size:14px;background:var(--accent);color:#fff;width:100%;transition:opacity .2s}
  .btn:active{opacity:.85}
  .btn.secondary{background:var(--bg2);color:var(--text)}
  .btn.outline{background:#fff;color:var(--text);border:1px solid var(--border)}
  .btn.danger{background:var(--red);color:#fff}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
  .card.alert-red{border-color:var(--red);background:var(--alert-red-bg)}
  .card.alert-green{border-color:var(--green);background:var(--alert-green-bg)}
  .card.highlight{border-color:var(--accent);border-width:2px}
  .row{display:flex;align-items:center;gap:8px}
  .row.between{justify-content:space-between}
  .badge{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;background:var(--bg2);color:var(--text)}
  .badge.green{background:var(--badge-green-bg);color:var(--green)}
  .badge.orange{background:var(--badge-orange-bg);color:var(--accent)}
  .badge.red{background:var(--badge-red-bg);color:var(--red)}
  .badge.yellow{background:var(--badge-yellow-bg);color:#C8A12B}
  .badge.muted{background:var(--badge-muted-bg);color:var(--muted)}
  .badge.blue{background:var(--badge-blue-bg);color:var(--blue)}
  .badge.clickable{cursor:pointer;text-decoration:underline}
  .header-week{margin-bottom:16px}
  .header-week .focus{font-size:13px;color:var(--muted);margin-top:4px}
  .train-section{margin-top:10px}
  .train-section .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:2px}
  .train-section .text{font-size:14px;line-height:1.4}
  .toggle{display:inline-flex;background:var(--bg2);padding:3px;border-radius:8px;margin:8px 0}
  .toggle button{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;color:var(--muted)}
  .toggle button.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:center;z-index:100}
  .bottom-nav-inner{display:flex;width:100%;max-width:480px}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600}
  .nav-btn svg{width:22px;height:22px}
  .nav-btn.active{color:var(--accent)}
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
  .modal{background:#fff;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border-radius:8px 8px 0 0;padding:18px}
  .modal h2{margin-bottom:12px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);font-family:inherit;font-size:14px;background:#fff;color:var(--text)}
  .field textarea{min-height:64px;resize:vertical}
  .field input[type=range]{padding:0}
  .radio-row{display:flex;gap:6px}
  .radio-row label{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--text);text-transform:none;letter-spacing:0;margin:0}
  .radio-row input{display:none}
  .radio-row input:checked + span{display:block}
  .radio-row label.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .slider-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px}
  .history-item{display:flex;flex-direction:column;gap:6px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
  .history-item .meta{display:flex;justify-content:space-between;font-size:13px}
  .history-item .icons{display:flex;gap:6px;font-size:11px;color:var(--muted)}
  .race-card{display:flex;flex-direction:column;gap:8px}
  .race-card .name{font-weight:700;font-size:16px}
  .race-card .date{font-size:13px;color:var(--muted)}
  .countdown{font-weight:700;color:var(--accent)}
  .loading{text-align:center;padding:20px;color:var(--muted);font-size:13px}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--bg2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
  .btn-row{display:flex;gap:8px}
  .btn-row .btn{flex:1}
  hr.sep{border:none;border-top:1px solid var(--border);margin:10px 0}
  .alert-pill{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px;margin-right:6px}
  .btn.small{padding:8px 12px;font-size:12px}
  .btn.export{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .help-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:#fff;color:var(--text);font-weight:700;font-size:14px;display:inline-flex;align-items:center;justify-content:center}
  .bell-wrap{position:relative;display:inline-flex}
  .bell-wrap .bell-dot{position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:var(--red);border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;line-height:1}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.2);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .toast.error{background:#ef4444}
  .metric-help{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;opacity:.6;transition:opacity .2s}
  .metric-help:hover{opacity:1}
  .help-list{padding-left:18px;font-size:14px;line-height:1.5}
  .help-list li{margin-bottom:6px}
  .zone-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
  .zone-table th{text-align:left;padding:8px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
  .zone-table td{padding:8px 6px;border-bottom:1px solid var(--border)}
  .zone-table tr:last-child td{border-bottom:none}
  .zone-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
  .zone-dot.z1{background:#3b82f6}
  .zone-dot.z2{background:#22c55e}
  .zone-dot.z3{background:#eab308}
  .zone-dot.z4{background:#f97316}
  .zone-dot.z5{background:#ef4444}
  .zone-badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;color:#fff;letter-spacing:.3px}
  .zone-badge.z1{background:#3b82f6}
  .zone-badge.z2{background:#22c55e}
  .zone-badge.z3{background:#eab308}
  .zone-badge.z4{background:#f97316}
  .zone-badge.z5{background:#ef4444}
  .zone-bar{height:4px;border-radius:2px;display:flex;overflow:hidden;margin-bottom:10px}
  .zone-bar-seg{height:100%}
  .volume-label{font-size:13px;color:var(--accent);font-weight:700;margin-top:4px}
  .btn-intervals{display:inline-flex;align-items:center;gap:6px;padding:10px 14px;border-radius:8px;font-weight:600;font-size:13px;background:var(--bg2);color:var(--text);border:1px solid var(--border);width:100%;justify-content:center;cursor:pointer;transition:opacity .2s}
  .btn-intervals:active{opacity:.8}
  .btn-intervals:disabled{opacity:.5;cursor:not-allowed}
  .btn-intervals .emoji{font-size:16px}
  .modal-status{padding:14px;border-radius:8px;font-size:14px;font-weight:600;text-align:center;margin-top:12px}
  .modal-status.success{background:var(--alert-green-bg);color:var(--green)}
  .modal-status.error{background:var(--alert-red-bg);color:var(--red)}
  .modal-select-btn{flex:1;padding:14px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:border-color .15s}
  .modal-select-btn:active{border-color:var(--accent)}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
  .stat-box{background:var(--bg2);border-radius:8px;padding:12px 10px;text-align:center}
  .stat-box .stat-val{font-size:22px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  .stat-box .stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .test-option{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:600;transition:border-color .15s}
  .test-option:active{border-color:var(--accent)}
  .test-cat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin:14px 0 6px}
  .test-cat-label:first-child{margin-top:0}
  .test-history-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg2);border-radius:8px;margin-bottom:8px}
  .test-history-item .thi-info{flex:1}
  .test-history-item .thi-tipo{font-weight:600;font-size:14px}
  .test-history-item .thi-data{font-size:12px;color:var(--muted)}
  .test-history-item .thi-vals{font-size:13px;margin-top:2px}
  .inline-error{color:var(--red);font-size:12px;margin-top:4px;display:none}
  .btn.start{background:var(--accent);color:#fff;font-size:15px;padding:14px 16px}
  .resume-banner{background:var(--accent);color:#fff;padding:14px 16px;border-radius:14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .resume-banner .rb-text{font-size:14px;font-weight:600}
  .resume-banner .rb-sub{font-size:12px;opacity:.8;margin-top:2px}
  .resume-banner .rb-actions{display:flex;gap:8px}
  .resume-banner .rb-btn{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer}
  .resume-banner .rb-btn.primary{background:#fff;color:var(--accent)}
  .resume-banner .rb-btn.secondary{background:rgba(255,255,255,.2);color:#fff}
  .workout-overlay{position:fixed;inset:0;background:#0E0E0E;color:#fff;z-index:400;display:flex;flex-direction:column;padding:24px 20px;overflow:hidden}
  .workout-overlay .phase-label{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#999;text-align:center}
  .workout-overlay .phase-name{font-size:32px;font-weight:700;text-align:center;margin-top:4px;color:#fff}
  .workout-overlay .phase-name.principal{color:var(--accent)}
  .workout-overlay .timer{font-size:104px;font-weight:700;line-height:1;text-align:center;margin:14px 0 8px;font-variant-numeric:tabular-nums;letter-spacing:-2px}
  .workout-overlay .timer.warn{color:var(--accent);animation:pulse .8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .workout-overlay .target-box{background:rgba(255,255,255,.06);border-radius:8px;padding:16px;margin:12px 0;text-align:center}
  .workout-overlay .target-box .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#999;font-weight:600}
  .workout-overlay .target-box .val{font-size:28px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
  .workout-overlay .target-box .sub{font-size:12px;color:#bbb;margin-top:6px;line-height:1.4}
  .workout-overlay .phase-progress{height:6px;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden;margin:8px 0}
  .workout-overlay .phase-progress .fill{height:100%;background:var(--accent);transition:width 1s linear}
  .workout-overlay .meta-row{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:6px}
  .workout-overlay .meta-row .num{color:#fff}
  .workout-overlay .phase-dots{display:flex;gap:6px;justify-content:center;margin:10px 0}
  .workout-overlay .phase-dots .dot{flex:1;max-width:60px;height:4px;background:rgba(255,255,255,.15);border-radius:2px}
  .workout-overlay .phase-dots .dot.done{background:#666}
  .workout-overlay .phase-dots .dot.current{background:var(--accent)}
  .workout-overlay .interval-info{text-align:center;margin:4px 0}
  .workout-overlay .interval-info .int-cycle{font-size:13px;font-weight:600;letter-spacing:1px;color:#999}
  .workout-overlay .interval-info .int-cycle.last{color:var(--accent)}
  .workout-overlay .interval-info .int-phase{font-size:11px;color:#666;margin-top:2px}
  .workout-overlay .interval-info .int-total{font-size:12px;color:#888;margin-top:6px;font-variant-numeric:tabular-nums}
  .workout-overlay .controls{margin-top:auto;display:flex;flex-direction:column;gap:10px}
  .workout-overlay .controls .row{display:flex;gap:10px}
  .workout-overlay .ctrl-btn{flex:1;padding:14px;border-radius:8px;font-weight:700;font-size:14px;background:rgba(255,255,255,.1);color:#fff;border:none}
  .workout-overlay .ctrl-btn.primary{background:var(--accent)}
  .workout-overlay .ctrl-btn.danger{background:rgba(211,47,47,.85)}
  .workout-overlay .ctrl-btn:active{opacity:.8}
  .workout-overlay.done .timer{color:var(--green)}
  .header-actions{display:flex;gap:6px}
  .copy-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:10px;background:var(--bg2);border-radius:8px;margin-bottom:8px}
  .copy-row .copy-content{flex:1;min-width:0}
  .copy-row .copy-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:3px}
  .copy-row .copy-value{font-size:14px;word-break:break-word;color:var(--text)}
  .copy-row .copy-btn{flex-shrink:0;background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;min-width:64px}
  .copy-row .copy-btn:disabled{background:var(--green);opacity:1}
  .switch{position:relative;width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:background .2s;flex-shrink:0}
  .switch.on{background:var(--accent)}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
  .switch.on::after{transform:translateX(20px)}
  .setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
  .setting-row:last-child{border-bottom:none}
  .setting-row .label{font-size:14px;font-weight:600}
  .setting-row .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .mute-btn{position:absolute;top:24px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;border:none;cursor:pointer}
  .mute-btn.muted{background:rgba(211,47,47,.7)}
  .picker-input{cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-family:inherit;font-size:14px;color:var(--text);font-weight:600}
  .picker-input:active{opacity:.85}
  .picker-input .ph{color:var(--muted);font-weight:400}
  .picker-input .chev{color:var(--muted);font-size:12px}
  .picker-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;display:flex;align-items:flex-end;justify-content:center}
  .picker-sheet{background:var(--modal);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:18px 14px 14px;box-shadow:0 -4px 16px rgba(0,0,0,.2)}
  .picker-title{text-align:center;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text);margin-bottom:4px}
  .picker-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:12px}
  .picker-cols{display:flex;height:200px;position:relative;align-items:center;gap:0}
  .picker-cols::before{content:'';position:absolute;left:6px;right:6px;top:80px;height:40px;background:var(--bg2);border-radius:8px;z-index:0;pointer-events:none}
  .picker-col{flex:1;height:200px;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative;z-index:1}
  .picker-col::-webkit-scrollbar{display:none}
  .picker-col-pad{height:80px}
  .picker-item{height:40px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-size:17px;font-weight:600;color:var(--muted);transition:color .15s,font-size .15s,opacity .15s;opacity:.5;font-variant-numeric:tabular-nums}
  .picker-item.selected{color:var(--text);font-size:19px;opacity:1}
  .picker-sep{width:14px;text-align:center;font-size:18px;color:var(--text);font-weight:700;z-index:1;font-variant-numeric:tabular-nums}

/* ========== STORAGE ========== */
const KEYS = { week: 'runcoach_semana_atual', logs: 'runcoach_logs', history: 'runcoach_historico_semanas', races: 'runcoach_corridas' };
function load(k, def) {
  try {
    const v = localStorage.getItem(k);
    return v ? JSON.parse(v) : def;
  } catch (e) {
    console.error('Erro ao ler ' + k + ':', e);
    localStorage.removeItem(k);
    return def;
  }
}
function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
const WEEK_DEFAULT = { semana_atual: 0, fase: '-', foco_da_semana: '', alerta_coach: null, treinos: [], observacao_coach: '' };
function getWeek() {
  try {
    const stored = localStorage.getItem(KEYS.week);
    if (!stored) return { ...WEEK_DEFAULT };
    const parsed = JSON.parse(stored);
    if (!parsed || !Array.isArray(parsed.treinos)) {
      console.error('runcoach_semana_atual com estrutura inválida, resetando');
      localStorage.removeItem(KEYS.week);
      return { ...WEEK_DEFAULT };
    }
    return parsed;
  } catch (e) {
    console.error('Erro ao ler semana:', e);
    localStorage.removeItem(KEYS.week);
    return { ...WEEK_DEFAULT };
  }
}
function setWeek(w) { save(KEYS.week, w); }
function getLogs() { return load(KEYS.logs, []); }
function setLogs(l) { save(KEYS.logs, l); }
function getHistory() { return load(KEYS.history, []); }
function setHistory(h) { save(KEYS.history, h); }
function getRaces() {

  if (stored) { try { return JSON.parse(stored); } catch { return []; } }
  if (localStorage.getItem(KEYS.week)) { save(KEYS.races, RACES_DEFAULT); return RACES_DEFAULT; }
  return [];
}
function setRaces(r) { save(KEYS.races, r); }

const APP_INITIALIZED = !!localStorage.getItem(KEYS.week);

/* ========== HELPERS ========== */
const DIAS_MAP = { Segunda:1, Terça:2, Quarta:3, Quinta:4, Sexta:5, Sábado:6, Domingo:0 };
const DIAS_NOMES = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

function fmtDateBR(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / (1000*60*60*24)); }
function parsePace(s) {
  if (!s) return null;
  const m = String(s).match(/(\d+)\s*['′:]\s*(\d+)/);
  if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
  const single = String(s).match(/^\s*(\d+)\s*['′]?\s*$/);
  if (single) return parseInt(single[1]) * 60;
  return null;
}
function parseTempo(s) {
  if (!s) return null;
  const t = String(s).trim();
  const hms = t.match(/^(\d+)\s*[h:]\s*(\d+)\s*['′:m]?\s*(\d{1,2})?\s*["″s]?\s*$/i);
  if (hms) {
    const h = parseInt(hms[1]) || 0, m = parseInt(hms[2]) || 0, s2 = parseInt(hms[3] || '0');
    if (t.includes('h') || (h > 0 && (m >= 60 || (hms[3] != null)))) return h*3600 + m*60 + s2;
  }
  const ms = t.match(/^(\d+)\s*['′:m]\s*(\d{1,2})\s*["″s]?\s*$/i);
  if (ms) return parseInt(ms[1])*60 + parseInt(ms[2]);
  const justMin = t.match(/^(\d+)\s*(?:min|')?$/i);
  if (justMin) return parseInt(justMin[1]) * 60;
  return null;
}
function fmtTempoInput(sec) {
  if (sec == null) return '';
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  if (h > 0) return `${h}h${String(m).padStart(2,'0')}'${String(s).padStart(2,'0')}"`;
  return `${m}'${String(s).padStart(2,'0')}"`;
}
function fmtPace(sec) {
  if (sec == null) return '-';
  const m = Math.floor(sec/60), s = sec%60;
  return `${m}'${String(s).padStart(2,'0')}"`;
}

function progressPct() {
  const w = getWeek();
  return Math.min(100, Math.round(((w.semana_atual - 1) / TOTAL_WEEKS) * 100));

/* ========== TRIGGERS ========== */
function detectTriggers() {
  const logs = getLogs();
  const triggers = [];
  const recent = logs.slice(-9);
  // Gatilho 1: 3 treinos consecutivos com sensação >=4
  let consec = 0;
  for (const l of recent) {
    if (l.sensacao >= 4) { consec++; if (consec >= 3) { triggers.push({ id:'sobrecarga', msg:'Você relatou treinos pesados em 3 sessões seguidas. O coach vai avaliar o plano antes de progredir.' }); break; } }
    else consec = 0;
  }
  // Gatilho 2: 2+ dor moderada em últimas 2 semanas
  const twoWeeksAgo = new Date(); twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14);
  const knee = logs.filter(l => l.joelho === 'moderada' && new Date(l.data) >= twoWeeksAgo);
  if (knee.length >= 2) triggers.push({ id:'joelho', msg:'2 ou mais registros de dor moderada no joelho. Coach vai reduzir impacto.' });
  // Gatilho 3: 3 semanas com <2 treinos completados
  const hist = getHistory();
  const last3 = hist.slice(-3);
  const baixaConcl = last3.filter(w => (w.treinos||[]).filter(t => ['Concluído','Realocado'].includes(t.status)).length < 2).length;
  if (last3.length >= 3 && baixaConcl >= 3) triggers.push({ id:'abandono', msg:'3 semanas com menos de 2 treinos concluídos. Coach vai revisar a abordagem.' });
  // Gatilho 4: média desvio_pace últimas 6 fora de ±45s
  const last6 = logs.slice(-6).filter(l => typeof l.desvio_pace === 'number');
  if (last6.length === 6) {
    const avg = last6.reduce((a,l)=>a+l.desvio_pace,0) / 6;
    if (Math.abs(avg) > 45) triggers.push({ id:'pace', msg:`Desvio médio de pace de ${Math.round(avg)}s/km nas últimas 6 sessões. Coach vai recalibrar faixas alvo.` });
  }
  return triggers;
}

/* swipe horizontal entre abas */
(function setupSwipe() {
  let xStart = null, yStart = null, swiping = false;
  document.body.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    if (document.querySelector('.modal-backdrop') || document.querySelector('.workout-overlay')) return;
    xStart = e.touches[0].clientX;
    yStart = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });
  document.body.addEventListener('touchend', (e) => {
    if (!swiping || xStart == null) return;
    swiping = false;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - xStart;
    const dy = touch.clientY - yStart;
    xStart = null; yStart = null;
    if (Math.abs(dx) < 70 || Math.abs(dy) > Math.abs(dx)) return;
    const idx = TAB_ORDER.indexOf(currentTab);
    if (idx < 0) return;
    if (dx < 0 && idx < TAB_ORDER.length - 1) setTab(TAB_ORDER[idx + 1]);
    else if (dx > 0 && idx > 0) setTab(TAB_ORDER[idx - 1]);
  }, { passive: true });
})();

function render() {
  updateProgressBar();
  const el = document.getElementById('content');
  if (currentTab === 'home') el.innerHTML = renderHome();
  else if (currentTab === 'semana') el.innerHTML = renderSemana();

  else if (currentTab === 'metricas') el.innerHTML = renderMetricas();
  else if (currentTab === 'avaliacao') el.innerHTML = renderAvaliacao();
  attachHandlers();
}

    const proxItem = treinosAtivos.find(({ t }) =>

/* ========== TAB 1: SEMANA ========== */
function statusBadge(status) {
  const map = { 'Pendente':'muted', 'Concluído':'green', 'Realocado':'orange', 'Perdido':'red' };
  return `<span class="badge ${map[status]||'muted'}">${status}</span>`;
}

function predictedDate(trainIdx) {
  const w = getWeek();
  const t = w.treinos[trainIdx];
  if (t.data_prevista) return t.data_prevista;
  // estimate: this week's occurrence of that weekday
  const today = new Date();
  const target = DIAS_MAP[t.dia];
  const diff = (target - today.getDay() + 7) % 7;
  const d = new Date(today); d.setDate(today.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function isPastPredicted(trainIdx) {
  const w = getWeek();
  const t = w.treinos[trainIdx];
  if (t.status !== 'Pendente') return false;
  const dp = predictedDate(trainIdx);
  return new Date(dp + 'T23:59:59') < new Date();
}

function retomarTreino() {
  const saved = getActiveWorkout();
  if (!saved) return;
  const w = getWeek();
  const treino = w.treinos[saved.treinoIdx];
  if (!treino) { clearActiveWorkout(); return; }

  if (saved.pausedAt) {
    const diff = Date.now() - saved.pausedAt;
    saved.pausedAcc += diff;
    saved.pausedFaseAcc += diff;
    saved.pausedAt = null;
  }

  const fases = saved.fasesConfig;
  const overlay = document.createElement('div');
  overlay.className = 'workout-overlay';
  overlay.innerHTML = `
    <button class="mute-btn ${getSettings().mute ? 'muted' : ''}" id="wMute" aria-label="Silenciar">${getSettings().mute ? '🔇' : '🔊'}</button>
    <div class="meta-row" style="padding-right:48px">
      <span>${escapeHtml(saved.treinoTipo || treino.tipo)} · ${saved.modo === 'rua' ? 'Rua' : 'Esteira'}</span>
      <span>Total: <span class="num" id="wTotal">00:00</span> / <span class="num" id="wTotalMax">00:00</span></span>
    </div>
    <div class="phase-dots" id="wDots"></div>
    <div class="phase-label" id="wPhaseLbl">FASE ${saved.faseIdx + 1} DE ${fases.length}</div>
    <div class="phase-name" id="wPhaseName">—</div>
    <div class="timer" id="wTimer">00:00</div>
    <div class="interval-info" id="wIntInfo" style="display:none">
      <div class="int-cycle" id="wIntCycle"></div>
      <div class="int-phase" id="wIntPhase"></div>
      <div class="int-total" id="wIntTotal"></div>
    </div>
    <div class="phase-progress"><div class="fill" id="wPhaseFill" style="width:0%"></div></div>
    <div class="target-box">
      <div class="lbl">Pace alvo</div>
      <div class="val" id="wAlvo">—</div>
      <div class="sub" id="wDesc">—</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn primary" id="wPause">Pausar</button>
      <div class="row">
        <button class="ctrl-btn" id="wSkip">Pular fase</button>
        <button class="ctrl-btn danger" id="wStop">Encerrar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const totalDur = fases.reduce((a, f) => a + f.dur, 0);
  document.getElementById('wTotalMax').textContent = fmtClock(totalDur);
  const dotsEl = document.getElementById('wDots');
  dotsEl.innerHTML = fases.map(() => `<span class="dot"></span>`).join('');

  const restoredIntv = saved.intv ? {
    config: saved.intv.config,
    ciclo: saved.intv.ciclo,
    subFase: saved.intv.subFase,
    subFaseStart: saved.intv.subFaseStart,
    subFasePausedAcc: saved.intv.subFasePausedAcc,
    avisou5: saved.intv.avisou5,
  } : null;

  workoutState = {
    overlay, fases,
    faseIdx: saved.faseIdx,
    faseStart: saved.faseStart,
    workoutStart: saved.workoutStart,
    pausedAt: null,
    pausedAcc: saved.pausedAcc,
    pausedFaseAcc: saved.pausedFaseAcc,
    treinoIdx: saved.treinoIdx,
    rafId: null,
    avisou30: saved.avisou30,
    encerrado: false,
    wakeLock: null,
    modo: saved.modo,
    treinoTipo: saved.treinoTipo,
    intv: restoredIntv,
  };
  aquireWakeLock().then(wl => { if (workoutState) workoutState.wakeLock = wl; });

  const f = fases[saved.faseIdx];
  const dots = overlay.querySelectorAll('.dot');
  dots.forEach((d, i) => { d.classList.toggle('done', i < saved.faseIdx); d.classList.toggle('current', i === saved.faseIdx); });

  if (f.tipo === 'main' && restoredIntv) {
    overlay.querySelector('#wIntInfo').style.display = 'block';
    atualizarIntervaloUI(workoutState);
  } else {
    overlay.querySelector('#wPhaseName').textContent = f.nome;
    overlay.querySelector('#wPhaseName').classList.toggle('principal', f.tipo === 'main');
    overlay.querySelector('#wAlvo').textContent = f.alvo;
    overlay.querySelector('#wDesc').textContent = f.desc;
  }

  bip(1, 660);
  falar('Treino retomado.');
  tick();
  pedirPermissaoNotificacao();
  agendarNotificacoesFase(workoutState);

  document.getElementById('wPause').addEventListener('click', togglePause);
  document.getElementById('wSkip').addEventListener('click', pularFase);
  document.getElementById('wStop').addEventListener('click', () => encerrarTreino(true));
  document.getElementById('wMute').addEventListener('click', () => {
    const s = getSettings();
    setSettings({ ...s, mute: !s.mute });
    const btn = document.getElementById('wMute');
    btn.classList.toggle('muted', !s.mute);
    btn.textContent = !s.mute ? '🔇' : '🔊';
  });
  document.addEventListener('visibilitychange', onVisibility);
}

function calcAderencia(w) {
  const previstos = (w.treinos || []).filter(t => t.tipo?.toLowerCase() !== 'descanso').length;
  const concluidos = (w.treinos || []).filter(t => t.tipo?.toLowerCase() !== 'descanso' && t.status === 'Concluído').length;
  return { previstos, concluidos, pct: previstos > 0 ? Math.round((concluidos / previstos) * 100) : null };
}

function aderenciaHtml(w) {
  const { previstos, concluidos, pct } = calcAderencia(w);
  if (pct === null) return '';
  const cor = pct >= 80 ? '#22c55e' : pct >= 50 ? '#eab308' : '#ef4444';
  return `<div style="font-size:13px;font-weight:600;color:${cor}">Aderência: ${concluidos}/${previstos} treinos (${pct}%)</div>`;
}

/* ========== TAB 3: MÉTRICAS ========== */
function fmtTempo(sec) {
  sec = Math.round(sec || 0);
  if (sec <= 0) return '0min';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}h ${String(m).padStart(2,'0')}min` : `${m}min`;
}
function tempoDeLog(l) {
  if (typeof l.tempo_segundos === 'number' && l.tempo_segundos > 0) return l.tempo_segundos;
  const ps = parsePace(l.pace_real);
  return ps && l.distancia ? ps * l.distancia : 0;
}
function avgNums(arr) {
  const xs = arr.filter(x => typeof x === 'number' && !isNaN(x));
  return xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;
}

function calcMetricas() {
  const logs = getLogs();
  const w = getWeek();
  const hist = getHistory();
  const today = todayISO();

  const logsSemana = logs.filter(l => l.semana === w.semana_atual);
  const distSem = logsSemana.reduce((a, l) => a + (l.distancia || 0), 0);
  const tempoSem = logsSemana.reduce((a, l) => a + tempoDeLog(l), 0);
  const concluidosSem = w.treinos.filter(t => t.status === 'Concluído').length;
  const pseSem = avgNums(logsSemana.map(l => l.pse).filter(x => x != null));

  const totLog = logs.length;
  const distTot = logs.reduce((a, l) => a + (l.distancia || 0), 0);
  const tempoTot = logs.reduce((a, l) => a + tempoDeLog(l), 0);
  const pseTot = avgNums(logs.map(l => l.pse).filter(x => x != null));

  const comPaceDist = logs.filter(l => parsePace(l.pace_real) && l.distancia);
  const totDistComPace = comPaceDist.reduce((a, l) => a + l.distancia, 0);
  const paceMedio = totDistComPace > 0
    ? comPaceDist.reduce((a, l) => a + parsePace(l.pace_real) * l.distancia, 0) / totDistComPace
    : null;

  const paces = logs.map(l => parsePace(l.pace_real)).filter(x => x);
  const melhorPace = paces.length ? Math.min(...paces) : null;

  const joelhoLeve = logs.filter(l => l.joelho === 'leve').length;
  const joelhoMod = logs.filter(l => l.joelho === 'moderada').length;
  const naoSeguiu = logs.filter(l => l.seguiu_parametros === false).length;

  const semanasNoPlano = hist.length + 1;
  const treinosPlanejados = semanasNoPlano * 3;
  const adesao = treinosPlanejados > 0 ? (totLog / treinosPlanejados) * 100 : 0;

  const porTipo = {};
  for (const l of logs) {
    if (!porTipo[l.tipo]) porTipo[l.tipo] = { n: 0, paceSum: 0, paceN: 0, distSum: 0, paces: [] };
    porTipo[l.tipo].n++;
    const ps = parsePace(l.pace_real);
    if (ps) { porTipo[l.tipo].paceSum += ps; porTipo[l.tipo].paceN++; porTipo[l.tipo].paces.push(ps); }
    if (l.distancia) porTipo[l.tipo].distSum += l.distancia;
  }

  const prim = logs.slice(0, 3).map(l => parsePace(l.pace_real)).filter(x => x);
  const ult = logs.slice(-3).map(l => parsePace(l.pace_real)).filter(x => x);
  const primAvg = prim.length ? avgNums(prim) : null;
  const ultAvg = ult.length ? avgNums(ult) : null;
  const evolucao = primAvg && ultAvg ? Math.round(primAvg - ultAvg) : null;

  let streak = 0;
  const todasSemanas = [...hist, w];
  for (let i = todasSemanas.length - 1; i >= 0; i--) {
    const sw = todasSemanas[i];
    const c = (sw.treinos || []).filter(t => ['Concluído', 'Realocado'].includes(t.status)).length;
    if (c >= 1) streak++; else break;
  }

  const carga4sem = [];
  const semAtualNum = w.semana_atual;
  const histDedup = hist.filter(h => h.semana_atual != semAtualNum);
  const lastHist = histDedup.slice(-7);
  for (const h of lastHist) {
    let vol = 0;
    (h.treinos || []).forEach(t => {
      const km = getDistanciaKm(t, 'rua') || getDistanciaKm(t, 'esteira') || 0;
      if (km) vol += km;
    });
    carga4sem.push({ vol });
  }
  carga4sem.push({ vol: calcVolumeSemanal(w) });
  carga4sem.forEach((s, i) => { s.label = `Sem ${i + 1}`; });

  return {
    semanaNum: w.semana_atual, fase: w.fase, concluidosSem, distSem, tempoSem, pseSem,
    totLog, distTot, tempoTot, pseTot, paceMedio, melhorPace, semanasNoPlano, adesao,
    joelhoLeve, joelhoMod, naoSeguiu, porTipo, primAvg, ultAvg, evolucao, streak,
    carga4sem,
  };
}

function statCard(lbl, val, sub) {
  return `<div style="flex:1;min-width:0">

    <div class="num" style="font-size:22px;font-weight:700;margin-top:2px">${val}</div>
    ${sub ? `<div class="muted" style="font-size:11px;margin-top:2px">${sub}</div>` : ''}
  </div>`;
}

    <div class="row" style="gap:14px;align-items:flex-start">

  </div>`;

  html += `<div class="card" style="position:relative">
    ${mHelp('resumo_geral')}
    <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:10px">Resumo geral</div>

      ${statCard('Tempo', fmtTempo(m.tempoTot))}
    </div>
    <hr class="sep">
    <div class="row" style="gap:14px;align-items:flex-start">
      ${statCard('Pace médio', m.paceMedio ? fmtPace(Math.round(m.paceMedio)) + '<span style="font-size:13px;font-weight:600">/km</span>' : '-')}
      ${statCard('Melhor pace', m.melhorPace ? fmtPace(Math.round(m.melhorPace)) + '<span style="font-size:13px;font-weight:600">/km</span>' : '-')}
      ${statCard('Adesão', `${Math.round(m.adesao)}<span style="font-size:13px;font-weight:600">%</span>`)}
    </div>
    ${m.pseTot != null ? `<div class="muted" style="font-size:12px;margin-top:10px">PSE médio geral: <span class="num" style="color:var(--text);font-weight:600">${m.pseTot.toFixed(1)}</span> / 10</div>` : ''}
  </div>`;

  if (m.carga4sem.length >= 1) {
    const nBars = m.carga4sem.length;
    const cargaTitulo = nBars === 1 ? 'Carga da semana atual' : `Carga das últimas ${nBars} semanas`;
    const maxVol = Math.max(...m.carga4sem.map(s => s.vol), 1);

    const barW = Math.floor((svgTotalW - pad * 2 - gap * (nBars - 1)) / nBars);
    const svgH = 160, chartH = 120, padTop = 10;
    let bars = '';
    const labelFs = nBars <= 4 ? 11 : nBars <= 6 ? 10 : 9;
    m.carga4sem.forEach((s, i) => {
      const h = s.vol > 0 ? Math.max(4, (s.vol / maxVol) * chartH) : 0;
      const x = pad + i * (barW + gap);
      const y = padTop + chartH - h;
      const isAtual = i === nBars - 1;
      const opacity = isAtual ? '1' : '0.6';
      bars += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="4" fill="#f97316" opacity="${opacity}"/>`;
      const labelTxt = `${s.label} · ${s.vol.toFixed(1)}km`;
      bars += `<text x="${x + barW/2}" y="${padTop + chartH + 15}" text-anchor="middle" font-size="${labelFs}" fill="#9ca3af">${escapeHtml(labelTxt)}</text>`;

    const txt = m.evolucao > 0 ? `${m.evolucao}s mais rápido` : (m.evolucao < 0 ? `${Math.abs(m.evolucao)}s mais lento` : 'estável');

      </div>
      <div class="row between" style="font-size:13px;margin-top:4px">
        <span>Últimas 3</span><span class="num" style="font-weight:600">${fmtPace(Math.round(m.ultAvg))}/km</span>
      </div>
      <div style="margin-top:8px;font-size:14px;font-weight:700;color:${cor}">${sinal} ${txt}</div>
    </div>`;
  }

  const tipos = Object.entries(m.porTipo);
  if (tipos.length > 0) {
    html += `<div class="card" style="position:relative">
      ${mHelp('por_tipo')}
      <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:10px">Por tipo de treino</div>`;
    for (const [tipo, info] of tipos) {
      const paceAvg = info.paceN > 0 ? info.paceSum / info.paceN : null;
      html += `<div class="row between" style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
        <div>
          <div style="font-weight:600">${escapeHtml(tipo)}</div>
          <div class="muted" style="font-size:11px;margin-top:2px">${info.n}× · ${info.distSum.toFixed(1)} km</div>
        </div>
        <div class="num" style="font-weight:600;text-align:right">${paceAvg ? fmtPace(Math.round(paceAvg)) + '/km' : '-'}</div>
      </div>`;
    }
    html += `</div>`;

    const tiposComPace = tipos.filter(([, info]) => info.paces && info.paces.length >= 2);
    if (tiposComPace.length > 0) {
      html += `<div class="card">
        <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:10px">Melhor pace por tipo</div>`;
      for (const [tipo, info] of tiposComPace) {
        const primeiro = info.paces[0];
        const melhor = Math.min(...info.paces);
        const ultimo = info.paces[info.paces.length - 1];
        html += `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:13px;font-weight:600;margin-bottom:4px">${escapeHtml(tipo)}</div>
          <div style="font-size:12px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
            <span class="num">${fmtPace(primeiro)}</span>
            <span class="muted">→</span>
            <span class="num" style="color:var(--green);font-weight:700">${fmtPace(melhor)}</span>
            <span class="muted">→</span>
            <span class="num">${fmtPace(ultimo)}/km</span>
          </div>
          <div class="muted" style="font-size:10px;margin-top:2px">primeiro → melhor → último</div>
        </div>`;
      }
      html += `</div>`;
    }
  }

  if (m.joelhoLeve + m.joelhoMod + m.naoSeguiu > 0) {
    html += `<div class="card" style="position:relative">
      ${mHelp('alertas')}
      <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:10px">Alertas registrados</div>
      ${m.joelhoLeve > 0 ? `<div class="row between" style="font-size:13px;padding:4px 0"><span>Dor leve no joelho</span><span class="num" style="color:var(--yellow);font-weight:600">${m.joelhoLeve}×</span></div>` : ''}
      ${m.joelhoMod > 0 ? `<div class="row between" style="font-size:13px;padding:4px 0"><span>Dor moderada no joelho</span><span class="num" style="color:var(--red);font-weight:600">${m.joelhoMod}×</span></div>` : ''}
      ${m.naoSeguiu > 0 ? `<div class="row between" style="font-size:13px;padding:4px 0"><span>Não seguiu parâmetros</span><span class="num" style="color:var(--red);font-weight:600">${m.naoSeguiu}×</span></div>` : ''}
    </div>`;
  }

  return html;
}

/* ========== INTERVALS.ICU ========== */
const INTERVALS_KEY = 'runcoach_intervals_key';
function getIntervalsKey() { return localStorage.getItem(INTERVALS_KEY) || ''; }
function setIntervalsKey(key) { localStorage.setItem(INTERVALS_KEY, key); }

function parseDuracaoParaSegundos(duracaoStr) {
  if (!duracaoStr) return 1800;
  const matchHora = duracaoStr.match(/(\d+)\s*h/);
  const matchMin = duracaoStr.match(/(\d+)\s*min/);
  let segundos = 0;
  if (matchHora) segundos += parseInt(matchHora[1]) * 3600;
  if (matchMin) segundos += parseInt(matchMin[1]) * 60;
  return segundos > 0 ? segundos : 1800;
}

function buildIntervalsDescription(bloco, zonas) {
  if (!bloco) return null;

  const zoneNum = (str) => str?.replace(/\D/g, '') || '2';
  const paceCue = (z) => {
    const data = zonas?.[z?.toLowerCase()];
    return data ? ` (${data.pace_min}-${data.pace_max}/km)` : '';
  };
  const stepLine = (min, zona) => `- ${min}m Z${zoneNum(zona)} HR${paceCue(zona)}`;

  const aqMin = extrairMinutos(bloco.aquecimento) || 5;
  const dqMin = extrairMinutos(bloco.desaquecimento) || 5;
  const zonaAq = bloco.zona_aquecimento || 'Z1';
  const zonaDq = bloco.zona_desaquecimento || 'Z1';
  const zonaPrincipal = bloco.zona_principal || 'Z2';

  const sections = [];
  sections.push('Warmup');
  sections.push(stepLine(aqMin, zonaAq));

  if (bloco.intervalos && bloco.intervalos.ciclos && bloco.intervalos.fases) {
    const { ciclos, fases } = bloco.intervalos;
    sections.push('');
    sections.push(`Main Set ${ciclos}x`);
    const zonaFallback = ['Z2', 'Z3', 'Z4', 'Z5'];
    fases.forEach((f, i) => {
      const min = Math.max(1, Math.round((f.duracao_segundos || 60) / 60));
      const zona = f.zona_fase || zonaFallback[i] || zonaPrincipal;
      sections.push(stepLine(min, zona));
    });
  } else {
    const totalMin = extrairMinutos(bloco.duracao_total) || 30;
    const principalMin = Math.max(1, totalMin - aqMin - dqMin);
    sections.push('');
    sections.push('Main Set');
    sections.push(stepLine(principalMin, zonaPrincipal));
  }

  sections.push('');
  sections.push('Cooldown');
  sections.push(stepLine(dqMin, zonaDq));

  return sections.join('\n');
}

async function enviarParaIntervals(treino, modalidade, dataISO) {
  const apiKey = getIntervalsKey();
  if (!apiKey) return;

  const bloco = treino[modalidade];
  const avaliacao = load(AVALIACAO_KEY, null);
  const zonas = (avaliacao && avaliacao.zonas) || {};

  const descricao = buildIntervalsDescription(bloco, zonas) || [
    bloco.aquecimento ? `Aquecimento: ${bloco.aquecimento}` : '',
    bloco.principal ? `Principal: ${bloco.principal}` : '',
    bloco.desaquecimento ? `Desaquecimento: ${bloco.desaquecimento}` : '',
    bloco.duracao_total ? `Duração: ${bloco.duracao_total}` : '',
  ].filter(Boolean).join('\n');

  const duracaoSegundos = parseDuracaoParaSegundos(bloco.duracao_total);

  const payload = [{
    category: 'WORKOUT',
    start_date_local: dataISO + 'T00:00:00',
    name: treino.tipo,
    type: 'Run',
    moving_time: duracaoSegundos,
    description: descricao,
    external_id: 'runcoach_' + treino.dia + '_' + dataISO
  }];

  console.log('Payload Intervals.icu:', JSON.stringify(payload));

  const response = await fetch('https://intervals.icu/api/v1/athlete/0/events/bulk?upsert=true', {
    method: 'POST',
    headers: {
      'Authorization': 'Basic ' + btoa('API_KEY:' + apiKey),
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    const status = response.status;
    if (status === 401 || status === 403) throw new Error('auth');
    if (status === 422) throw new Error('invalid');
    throw new Error('server');
  }

  return await response.json();
}

function openEnviarRelogioModal(idx) {
  const w = getWeek();
  const t = w.treinos[idx];
  const temRua = t.rua && (t.rua.aquecimento || t.rua.principal);
  const temEsteira = t.esteira && (t.esteira.aquecimento || t.esteira.principal);
  const temAmbos = temRua && temEsteira;

  if (temAmbos) {
    openModalidadeModal(idx);
  } else {
    const modalidade = temEsteira ? 'esteira' : 'rua';
    openEnviarConfirmModal(idx, modalidade);
  }
}

function openEnviarConfirmModal(idx, modalidade) {
  const w = getWeek();
  const t = w.treinos[idx];
  const bloco = t[modalidade];
  const dataDefault = predictedDate(idx);

  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  back.innerHTML = `<div class="modal">
    <h2>Enviar para relógio</h2>
    <div style="margin-bottom:14px">
      <div style="font-size:16px;font-weight:700">${escapeHtml(t.tipo)}</div>
      <div class="muted" style="font-size:13px;margin-top:4px">${escapeHtml(modalidade === 'esteira' ? '🏃 Esteira' : '🏃 Rua')}${bloco.duracao_total ? ' · ' + escapeHtml(bloco.duracao_total) : ''}</div>
    </div>
    <div class="field">
      <label>Data do treino</label>
      <input type="date" id="enviarData" value="${dataDefault}">
    </div>
    <div class="btn-row">
      <button class="btn outline" id="enviarCancel">Cancelar</button>
      <button class="btn" id="enviarConfirm">⌚ Enviar</button>
    </div>
    <div id="enviarStatus" style="display:none"></div>
  </div>`;
  document.body.appendChild(back);
  back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
  back.querySelector('#enviarCancel').addEventListener('click', () => back.remove());

  const btnConfirm = back.querySelector('#enviarConfirm');
  const statusDiv = back.querySelector('#enviarStatus');

  btnConfirm.addEventListener('click', async () => {
    const dataInput = back.querySelector('#enviarData');
    const dataISO = dataInput.value
      ? new Date(dataInput.value + 'T12:00:00').toISOString().split('T')[0]
      : new Date().toISOString().split('T')[0];
    if (!dataISO) { toast('Selecione uma data', 'error'); return; }

    btnConfirm.disabled = true;
    btnConfirm.textContent = '⏳ Enviando...';
    statusDiv.style.display = 'none';

    try {
      await enviarParaIntervals(t, modalidade, dataISO);
      statusDiv.className = 'modal-status success';
      statusDiv.textContent = '✅ Treino enviado! Verifique o relógio em alguns minutos.';
      statusDiv.style.display = 'block';
      setTimeout(() => back.remove(), 3000);
    } catch (err) {
      btnConfirm.disabled = false;
      btnConfirm.textContent = '⌚ Enviar';
      statusDiv.style.display = 'block';

      if (err.message === 'auth') {
        statusDiv.className = 'modal-status error';
        statusDiv.innerHTML = '❌ API key inválida — <u style="cursor:pointer" id="goToSettings">verifique nas configurações</u>';
        statusDiv.querySelector('#goToSettings').addEventListener('click', () => { back.remove(); openSettingsModal(); });
      } else if (err.message === 'invalid') {
        statusDiv.className = 'modal-status error';
        statusDiv.textContent = '❌ Dados inválidos — verifique se a data está correta e tente novamente';
      } else if (err.message === 'server') {
        statusDiv.className = 'modal-status error';
        statusDiv.textContent = '❌ Erro ao enviar — tente novamente';
      } else {
        statusDiv.className = 'modal-status error';
        statusDiv.textContent = '❌ Bloqueio de segurança do navegador (CORS). Tente pelo Chrome no Android ou acesse o app pelo navegador do celular.';
        console.error('Intervals.icu send error (likely CORS):', err);
      }
    }
  });
}

const ZONE_COLORS = { Z1: '#3b82f6', Z2: '#22c55e', Z3: '#eab308', Z4: '#f97316', Z5: '#ef4444' };

function zoneBadgeHtml(zona) {
  if (!zona || !ZONE_COLORS[zona]) return '';
  return `<span class="zone-badge ${zona.toLowerCase()}">${zona}</span>`;

function zoneBarHtml(data) {
  if (!data || !data.duracao_total) return '';
  const hasAnyZone = data.zona_aquecimento || data.zona_principal || data.zona_desaquecimento;
  if (!hasAnyZone) return '';
  const aqMin = extrairMinutos(data.aquecimento) || 0;
  const dqMin = extrairMinutos(data.desaquecimento) || 0;
  const totalMin = extrairMinutos(data.duracao_total) || 0;
  if (totalMin <= 0) return '';
  const principalMin = Math.max(0, totalMin - aqMin - dqMin);
  const segments = [];
  if (aqMin > 0) segments.push({ pct: (aqMin / totalMin) * 100, color: ZONE_COLORS[data.zona_aquecimento] || '#ccc' });
  if (principalMin > 0) segments.push({ pct: (principalMin / totalMin) * 100, color: ZONE_COLORS[data.zona_principal] || '#ccc' });
  if (dqMin > 0) segments.push({ pct: (dqMin / totalMin) * 100, color: ZONE_COLORS[data.zona_desaquecimento] || '#ccc' });
  if (segments.length === 0 && data.zona_principal) return `<div class="zone-bar"><div class="zone-bar-seg" style="width:100%;background:${ZONE_COLORS[data.zona_principal]}"></div></div>`;
  return `<div class="zone-bar">${segments.map(s => `<div class="zone-bar-seg" style="width:${s.pct.toFixed(1)}%;background:${s.color}"></div>`).join('')}</div>`;
}

function getDistanciaKm(t, mode) {
  const data = t[mode];
  if (data && data.distancia_km) return data.distancia_km;
  if (t.distancia_km) return t.distancia_km;
  return null;
}

function calcVolumeSemanal(w) {
  if (!w || !w.treinos) return 0;
  let total = 0;
  for (const t of w.treinos) {
    const mode = trainModeByIdx[w.treinos.indexOf(t)] || 'rua';
    const km = getDistanciaKm(t, mode);
    if (km) total += km;
  }
  return total;
}

const ZONE_PERCENTS = {
  z1: { min: 0.55, max: 0.65, label: 'Z1 · Regenerativo', cls: 'z1' },
  z2: { min: 0.65, max: 0.75, label: 'Z2 · Aeróbico leve', cls: 'z2' },
  z3: { min: 0.75, max: 0.85, label: 'Z3 · Tempo/Limiar', cls: 'z3' },
  z4: { min: 0.85, max: 0.92, label: 'Z4 · Limiar alto', cls: 'z4' },
  z5: { min: 0.92, max: 1.00, label: 'Z5 · VO2max', cls: 'z5' },
};

function kmhToPace(kmh) {
  if (!kmh || kmh <= 0) return '—';
  const totalSecs = Math.round(3600 / kmh);
  const m = Math.floor(totalSecs / 60);
  const s = totalSecs % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function calcZonas(vam) {
  const zonas = {};
  for (const [key, z] of Object.entries(ZONE_PERCENTS)) {
    const minKmh = +(vam * z.min).toFixed(2);
    const maxKmh = +(vam * z.max).toFixed(2);
    const midKmh = (minKmh + maxKmh) / 2;
    zonas[key] = {
      min_kmh: minKmh,
      max_kmh: maxKmh,
      pace_min: kmhToPace(maxKmh),
      pace_max: kmhToPace(minKmh),
      pace_central: kmhToPace(midKmh),
    };
  }
  return zonas;
}

function calcVAM(tipo, entrada) {
  if (tipo === 'VAM Esteira' || tipo === 'VAM Manual') return entrada.velocidade_kmh;
  if (entrada.tempo_segundos && entrada.distancia_metros) {
    return (entrada.distancia_metros / entrada.tempo_segundos) * 3.6;
  }
  return 0;
}

function findTestType(nome) {
  for (const cat of TEST_TYPES) {
    const found = cat.items.find(t => t.nome === nome);
    if (found) return found;
  }
  return null;
}

function recalcAvaliacaoFromTests(av) {
  if (!av || !av.testes || av.testes.length === 0) return null;
  const ultimo = av.testes[av.testes.length - 1];
  av.vam = +ultimo.vam.toFixed(2);
  av.vo2max = +(ultimo.vam * 3.5).toFixed(1);
  av.zonas = calcZonas(ultimo.vam);
  av.atualizado_em = ultimo.data;
  return av;
}

  html += `<button class="btn" id="btnNovoTeste" style="margin-bottom:16px">Novo Teste de Performance</button>`;

  for (const t of testes) {

function openTesteInputModal(tipoNome) {
  const tt = findTestType(tipoNome);
  if (!tt) return;

  const back = document.createElement('div');
  back.className = 'modal-backdrop';

  let fieldsHtml = '';
  if (tt.input === 'tempo') {
    fieldsHtml = `<div class="field"><label>Tempo realizado</label>${pickerInputHtml('testTempo', '', 'MM:SS')}</div>`;
  } else if (tt.input === 'distancia') {
    fieldsHtml = `<div class="field"><label>Distância percorrida (metros)</label><input type="number" id="testDist" placeholder="ex: 2400" inputmode="numeric" min="1"></div>`;
  } else if (tt.input === 'velocidade') {
    fieldsHtml = `<div class="field"><label>Velocidade máxima (km/h)</label><input type="number" id="testVel" placeholder="ex: 12.5" inputmode="decimal" step="0.1" min="5" max="30"></div>`;
  }

  back.innerHTML = `<div class="modal" style="padding:20px">
    <h2 style="margin-bottom:4px">${escapeHtml(tipoNome)}</h2>
    <div class="muted" style="margin-bottom:14px">${tt.input === 'tempo' ? `Distância: ${(tt.dist/1000).toFixed(tt.dist >= 10000 ? 1 : 0)} km` : tt.input === 'distancia' ? `Duração: ${tt.durSeg / 60} minutos` : 'Informe a velocidade atingida'}</div>
    ${fieldsHtml}
    <div class="field"><label>Data do teste</label>${pickerInputHtml('testData', fmtDateBR(todayISO()), 'Selecionar data')}</div>
    <div id="testError" class="inline-error"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn outline" id="testInputCancel">Cancelar</button>
      <button class="btn" id="testInputSave">Calcular e Salvar</button>
    </div>
  </div>`;
  document.body.appendChild(back);
  back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
  back.querySelector('#testInputCancel').addEventListener('click', () => back.remove());

  const dataEl = back.querySelector('#testData');
  dataEl.dataset.value = todayISO();
  dataEl.addEventListener('click', () => {
    openDatePicker(dataEl.dataset.value, (iso) => pickerInputSet(dataEl, iso, fmtDateBR(iso)));
  });

  if (tt.input === 'tempo') {
    const tempoEl = back.querySelector('#testTempo');
    tempoEl.dataset.value = '';
    tempoEl.addEventListener('click', () => {
      const cur = parseInt(tempoEl.dataset.value) || 0;
      openTempoPicker(cur, ({ seconds, text }) => pickerInputSet(tempoEl, String(seconds), text));
    });
  }

  back.querySelector('#testInputSave').addEventListener('click', () => {
    const errEl = back.querySelector('#testError');
    errEl.style.display = 'none';

    let entrada = {};
    let vam = 0;

    if (tt.input === 'tempo') {
      const tempoSeg = parseInt(back.querySelector('#testTempo').dataset.value) || 0;
      if (tempoSeg <= 0) { errEl.textContent = 'Informe o tempo realizado.'; errEl.style.display = 'block'; return; }
      entrada = { tempo_segundos: tempoSeg, distancia_metros: tt.dist };
      vam = (tt.dist / tempoSeg) * 3.6;
    } else if (tt.input === 'distancia') {
      const dist = parseFloat(back.querySelector('#testDist').value);
      if (!dist || dist <= 0) { errEl.textContent = 'Informe a distância percorrida.'; errEl.style.display = 'block'; return; }
      entrada = { tempo_segundos: tt.durSeg, distancia_metros: dist };
      vam = (dist / tt.durSeg) * 3.6;
    } else if (tt.input === 'velocidade') {
      const vel = parseFloat(back.querySelector('#testVel').value);
      if (!vel || vel < 5 || vel > 30) { errEl.textContent = 'VAM deve estar entre 5 e 30 km/h.'; errEl.style.display = 'block'; return; }
      entrada = { velocidade_kmh: vel };
      vam = vel;
    }

    const data = dataEl.dataset.value || todayISO();
    const vo2max = +(vam * 3.5).toFixed(1);
    vam = +vam.toFixed(2);

    const teste = {
      id: Date.now(),
      tipo: tipoNome,
      data,
      entrada,
      vam,
      vo2max,
    };

    let av = getAvaliacao() || { vo2max: 0, vam: 0, zonas: {}, atualizado_em: '', testes: [] };
    av.testes.push(teste);
    av.testes.sort((a, b) => a.data.localeCompare(b.data) || a.id - b.id);
    recalcAvaliacaoFromTests(av);
    setAvaliacao(av);

    back.remove();
    render();
    toast('Teste salvo! Zonas atualizadas.', 'success');
  });
}

function deletarTeste(id) {
  const av = getAvaliacao();
  if (!av || !av.testes) return;
  const t = av.testes.find(x => x.id === id);
  if (!t) return;
  if (!confirm(`Remover teste "${t.tipo}" de ${fmtDateBR(t.data)}?`)) return;
  av.testes = av.testes.filter(x => x.id !== id);
  if (av.testes.length === 0) {
    localStorage.removeItem(AVALIACAO_KEY);
  } else {
    recalcAvaliacaoFromTests(av);
    setAvaliacao(av);
  }
  render();
  toast('Teste removido');
}

  document.body.appendChild(back);

  back.querySelectorAll('.radio-row').forEach(row => {
    row.querySelectorAll('label').forEach(lab => {
      lab.addEventListener('click', () => {
        row.querySelectorAll('label').forEach(l => l.classList.remove('sel'));
        lab.classList.add('sel');
        lab.querySelector('input').checked = true;
        if (row.id === 'rrSeguiu') {
          const val = row.querySelector('input:checked').value;
          back.querySelector('#fMotivoWrap').style.display = val === 'nao' ? 'block' : 'none';

      });

  });
  back.querySelector('#btnCancel').addEventListener('click', () => back.remove());

  const elData = back.querySelector('#fData');
  elData.dataset.value = def.data || todayISO();
  elData.dataset.placeholder = 'Selecionar data';
  elData.addEventListener('click', () => {
    openDatePicker(elData.dataset.value, (iso) => {
      pickerInputSet(elData, iso, fmtDateBR(iso));

  const elPace = back.querySelector('#fPace');
  const paceInicial = parsePace(def.pace_real);
  elPace.dataset.value = paceInicial != null ? String(paceInicial) : '';

    openDistPicker(cur, (km) => {
      pickerInputSet(elDist, String(km), km.toFixed(2).replace('.', ',') + ' km');
    });

  const elTempo = back.querySelector('#fTempo');
  elTempo.dataset.value = def.tempo_segundos != null ? String(def.tempo_segundos) : '';
  elTempo.dataset.placeholder = "ex: 30'00\"";
  elTempo.addEventListener('click', () => {
    const cur = parseInt(elTempo.dataset.value) || 0;
    openTempoPicker(cur, ({ seconds, text }) => {
      pickerInputSet(elTempo, String(seconds), text);
    });

  back.querySelector('#btnSave').addEventListener('click', () => {
    const modo = back.querySelector('input[name=modo]:checked').value;
    const data = elData.dataset.value;
    const paceSeg = parseInt(elPace.dataset.value) || null;
    const paceTxt = paceSeg ? fmtPace(paceSeg) : '';
    const dist = parseFloat(elDist.dataset.value) || null;
    const tempoSeg = parseInt(elTempo.dataset.value) || null;
    const joelho = back.querySelector('input[name=joelho]:checked').value;
    const seguiu = back.querySelector('input[name=seguiu]:checked').value === 'sim';
    const motivo = back.querySelector('#fMotivo').value.trim();
    const obs = back.querySelector('#fObs').value.trim();
    if (!data) { alert('Informe a data'); return; }
    if (!seguiu && !motivo) { alert('Descreva o que aconteceu'); return; }
    const paceReal = paceSeg;
    const paceAlvo = (t.rua && t.rua.pace_alvo_central_segundos) || def.pace_alvo_segundos || null;
    const desvio = (paceReal != null && paceAlvo != null) ? paceReal - paceAlvo : null;

    if (isEdit) {
      const logs = getLogs();
      const i = logs.findIndex(x => x.ts === existingLog.ts);
      if (i >= 0) {
        logs[i] = {
          ...logs[i], data, modo,
          pace_real: paceTxt || null, desvio_pace: desvio,
          distancia: dist, tempo_segundos: tempoSeg,
          joelho,
          seguiu_parametros: seguiu, motivo_desvio: seguiu ? null : motivo,
          observacoes: obs || null,
        };
        setLogs(logs);
      }
      back.remove();
      render();
      toast('Treino atualizado', 'success');
      return;
    }

    const log = {
      data, dia: t.dia, tipo: t.tipo, modo,
      pace_real: paceTxt || null, pace_alvo_segundos: paceAlvo || null,
      desvio_pace: desvio, distancia: dist, tempo_segundos: tempoSeg,
      joelho,
      seguiu_parametros: seguiu, motivo_desvio: seguiu ? null : motivo,
      observacoes: obs || null, semana: getWeek().semana_atual,
      train_idx: idx, ts: Date.now()
    };
    const logs = getLogs(); logs.push(log); setLogs(logs);
    const w2 = getWeek(); w2.treinos[idx].status = 'Concluído'; w2.treinos[idx].data_efetiva = data; setWeek(w2);
    back.remove();
    render();
    openPSEModal(log.ts);
  });
}

function openPSEModal(logTs) {
  const PSE_COLORS = { 1:'#3b82f6',2:'#3b82f6',3:'#22c55e',4:'#22c55e',5:'#eab308',6:'#eab308',7:'#f97316',8:'#f97316',9:'#ef4444',10:'#ef4444' };
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  let btns = '';
  for (let n = 1; n <= 10; n++) {
    btns += `<button class="pse-btn" data-pse="${n}" style="background:${PSE_COLORS[n]};color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;padding:12px 0;cursor:pointer">${n}</button>`;
  }
  back.innerHTML = `<div class="modal" style="text-align:center">
    <h2>Como foi o treino?</h2>
    <p class="muted" style="font-size:12px;line-height:1.5;margin-bottom:16px">PSE — Percepção Subjetiva de Esforço: o quanto o treino foi difícil para você, de 1 (muito fácil) a 10 (máximo).</p>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px">${btns}</div>
    <button class="btn outline" id="pseSkip" style="font-size:13px;padding:8px 20px;opacity:.7">Pular</button>
  </div>`;
  document.body.appendChild(back);
  back.addEventListener('click', (e) => { if (e.target === back) { back.remove(); } });
  back.querySelectorAll('.pse-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const pse = parseInt(btn.dataset.pse);
      const logs = getLogs();
      const l = logs.find(x => x.ts === logTs);
      if (l) { l.pse = pse; setLogs(logs); }
      back.remove();
      toast('PSE registrado: ' + pse, 'success');
    });
  });
  back.querySelector('#pseSkip').addEventListener('click', () => { back.remove(); });
}

function deletarLog(ts) {
  const logs = getLogs();
  const l = logs.find(x => x.ts === ts);
  if (!l) return;
  if (!confirm(`Excluir treino de ${fmtDateBR(l.data)} (${l.tipo})?`)) return;
  const restantes = logs.filter(x => x.ts !== ts);
  setLogs(restantes);

  const aindaTem = restantes.some(x => x.semana === l.semana && x.train_idx === l.train_idx);
  if (!aindaTem) {
    const w = getWeek();
    if (l.semana === w.semana_atual && w.treinos[l.train_idx]) {
      w.treinos[l.train_idx].status = 'Pendente';
      delete w.treinos[l.train_idx].data_efetiva;
      setWeek(w);
    } else {
      const hist = getHistory();
      const idxH = hist.findIndex(h => h.semana_atual === l.semana);
      if (idxH >= 0 && hist[idxH].treinos[l.train_idx]) {
        hist[idxH].treinos[l.train_idx].status = 'Pendente';
        delete hist[idxH].treinos[l.train_idx].data_efetiva;
        setHistory(hist);
      }
    }
  }
  render();
  toast('Treino excluído');
}

      <label>JSON da semana</label>

    </div>

function previewSemana(back) {
  const txt = back.querySelector('#impJson').value.trim();
  const out = back.querySelector('#impPreview');
  if (!txt) { out.innerHTML = `<div class="card alert-red">Cole o JSON primeiro.</div>`; return; }
  const cleaned = txt.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
  let nextWeek;
  try { nextWeek = JSON.parse(cleaned); }
  catch (e) { out.innerHTML = `<div class="card alert-red">JSON inválido: ${escapeHtml(e.message)}</div>`; return; }
  if (!nextWeek.treinos || !Array.isArray(nextWeek.treinos) || nextWeek.treinos.length === 0) {
    out.innerHTML = `<div class="card alert-red">JSON sem campo "treinos" válido.</div>`;
    return;
  }

  let html = `<hr class="sep">
    <h3>Semana ${nextWeek.semana || '?'} · ${escapeHtml(nextWeek.fase || '-')}</h3>
    <div class="muted" style="font-size:12px;margin:4px 0 10px">${escapeHtml(nextWeek.foco_da_semana || '')}</div>`;
  if (nextWeek.alerta_coach) html += `<div class="card alert-red" style="font-size:13px">${escapeHtml(nextWeek.alerta_coach)}</div>`;
  for (const t of nextWeek.treinos) {
    html += `<div class="card">
      <strong>${escapeHtml(t.dia || '?')} — ${escapeHtml(t.tipo || '?')}</strong>
      <div class="muted" style="font-size:12px;margin-top:4px">${escapeHtml(t.objetivo || '')}</div>
      <div class="train-section"><div class="label">Rua · Principal</div><div class="text">${escapeHtml(t.rua?.principal || '-')}</div></div>
      <div class="train-section"><div class="label">Duração</div><div class="text num">${escapeHtml(t.rua?.duracao_total || '-')}</div></div>
    </div>`;
  }
  if (nextWeek.observacao_coach) html += `<div class="card" style="background:var(--bg2);border:none;font-size:13px">${escapeHtml(nextWeek.observacao_coach)}</div>`;
  if (Array.isArray(nextWeek.estimativas_provas) && nextWeek.estimativas_provas.length > 0) {
    const races = getRaces();
    const norm = (s) => String(s || '').trim().toLowerCase();
    html += `<div class="card"><div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px">Estimativas de prova</div>`;
    for (const e of nextWeek.estimativas_provas) {
      if (!e || !e.nome) continue;
      const existe = races.some(r => norm(r.name) === norm(e.nome));
      let tag;
      if (existe) {
        tag = '<span class="badge muted">atualizar</span>';
      } else if (e.nova && e.distancia && e.tempo_estimado) {
        tag = '<span class="badge blue">nova corrida</span>';
      } else if (e.nova) {
        const eid = 'estComp_' + Math.random().toString(36).slice(2, 8);
        tag = `<span class="badge orange clickable" data-est-complete="${eid}">completar dados</span>`;
        e._completeId = eid;
      } else {
        tag = '<span class="badge red">não encontrada</span>';
      }
      html += `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
        <div class="row between"><strong>${escapeHtml(e.nome)}</strong>${tag}</div>
        <div class="muted" style="font-size:12px;margin-top:2px">${escapeHtml(e.tempo_estimado || '-')} · ${escapeHtml(e.pace_estimado || '-')}${e.data ? ` · ${fmtDateBR(e.data)}` : ''}</div>
        <div id="${e._completeId || ''}" class="est-inline-form" style="display:none"></div>
      </div>`;
    }
    html += `</div>`;
  }
  out.innerHTML = html;

  out.querySelectorAll('[data-est-complete]').forEach(badge => {
    badge.addEventListener('click', () => {
      const eid = badge.dataset.estComplete;
      const est = nextWeek.estimativas_provas.find(x => x._completeId === eid);
      if (!est) return;
      const container = document.getElementById(eid);
      if (container.style.display !== 'none') { container.style.display = 'none'; return; }
      container.style.display = 'block';
      container.innerHTML = `
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">
          <div class="field"><label>Distância (km)</label><input type="number" step="0.1" id="${eid}_dist" value="${est.distancia || ''}" style="padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;width:100%"></div>
          <div class="field"><label>Tempo estimado</label><input type="text" id="${eid}_tempo" value="${est.tempo_estimado || ''}" placeholder="ex: 2h05min" style="padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;width:100%"></div>
          <div class="field"><label>Pace estimado</label><input type="text" id="${eid}_pace" value="${est.pace_estimado || ''}" placeholder="ex: 5'50&quot;/km" style="padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;width:100%"></div>
          <div class="field"><label>Data (opcional)</label><input type="date" id="${eid}_data" value="${est.data || ''}" style="padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;width:100%"></div>
          <button class="btn" id="${eid}_save" style="font-size:13px;padding:10px">Adicionar ao calendário</button>
        </div>`;
      container.querySelector(`#${eid}_save`).addEventListener('click', () => {
        const dist = container.querySelector(`#${eid}_dist`).value.trim();
        const tempo = container.querySelector(`#${eid}_tempo`).value.trim();
        if (!dist) { toast('Preencha a distância', 'error'); return; }
        if (!tempo) { toast('Preencha o tempo estimado', 'error'); return; }
        est.distancia = parseFloat(dist);
        est.tempo_estimado = tempo;
        est.pace_estimado = container.querySelector(`#${eid}_pace`).value.trim() || null;
        est.data = container.querySelector(`#${eid}_data`).value || null;
        est._completed = true;
        container.style.display = 'none';
        badge.className = 'badge blue';
        badge.textContent = 'nova corrida';
        badge.style.cursor = 'default';
        badge.style.textDecoration = 'none';
        badge.replaceWith(badge.cloneNode(true));
        toast(`${est.nome} pronta para criação`, 'success');
      });
    });
  });

  back.querySelector('#impJson').style.display = 'none';
  const lblJson = back.querySelector('label[for=""]') || back.querySelector('.field label');
  if (lblJson) lblJson.style.display = 'none';

  const oldBtn = back.querySelector('#impPreviewBtn');
  const newBtn = oldBtn.cloneNode(false);
  newBtn.id = 'impConfirm';
  newBtn.className = 'btn';
  newBtn.textContent = 'Confirmar e salvar';
  oldBtn.parentNode.replaceChild(newBtn, oldBtn);

  newBtn.addEventListener('click', () => {
    try {
      if (!nextWeek || !Array.isArray(nextWeek.treinos) || nextWeek.treinos.length === 0) {
        toast('JSON inválido: campo treinos ausente ou vazio', 'error');
        return;
      }
      const temSemanaExistente = !!localStorage.getItem(KEYS.week);
      const w = getWeek();
      if (temSemanaExistente) {
        w.treinos.forEach((t, idx) => {
          if (t.status === 'Pendente' && isPastPredicted(idx)) t.status = 'Perdido';
        });
        setWeek(w);
        const hist = getHistory(); hist.push(getWeek()); setHistory(hist);
      }
      const treinosComStatus = nextWeek.treinos.map(t => ({ ...t, status: 'Pendente', data_prevista: null }));
      setWeek({
        semana_atual: nextWeek.semana || (temSemanaExistente ? w.semana_atual + 1 : 1),
        fase: nextWeek.fase || w.fase || '-',
        foco_da_semana: nextWeek.foco_da_semana || '',
        alerta_coach: nextWeek.alerta_coach || null,
        treinos: treinosComStatus,
        observacao_coach: nextWeek.observacao_coach || ''
      });

      const resumo = aplicarEstimativasProvas(nextWeek.estimativas_provas);

      trainModeByIdx = {};
      back.remove();
      setTab('semana');
      let msg = 'Nova semana importada';
      if (resumo.atualizadas || resumo.criadas) {
        const partes = [];
        if (resumo.atualizadas) partes.push(`${resumo.atualizadas} corrida${resumo.atualizadas>1?'s':''} atualizada${resumo.atualizadas>1?'s':''}`);
        if (resumo.criadas) partes.push(`${resumo.criadas} nova${resumo.criadas>1?'s':''}`);
        msg += ` · ${partes.join(', ')}`;
      }
      toast(msg, 'success');
    } catch (e) {
      console.error('Erro ao importar semana:', e);
      toast('Erro ao importar: ' + e.message, 'error');
    }
  });
}

function aplicarEstimativasProvas(estimativas) {
  if (!Array.isArray(estimativas) || estimativas.length === 0) return { atualizadas: 0, criadas: 0 };
  const races = getRaces();
  let atualizadas = 0, criadas = 0;
  const norm = (s) => String(s || '').trim().toLowerCase();

  for (const e of estimativas) {
    if (!e || !e.nome) continue;
    const nomeAlvo = norm(e.nome);
    const idx = races.findIndex(r => norm(r.name) === nomeAlvo);

    if (idx >= 0) {
      const r = races[idx];
      if (e.tempo_estimado) r.time_estimate = String(e.tempo_estimado);
      if (e.pace_estimado) r.estimate_pace = String(e.pace_estimado);
      if (e.data) r.date = String(e.data);
      if (e.distancia) r.distance = String(e.distancia);
      races[idx] = r;
      atualizadas++;
    } else if (e.nova === true) {
      const temDadosSuficientes = e.distancia && e.tempo_estimado;
      const completouManual = e._completed === true;
      if (!temDadosSuficientes && !completouManual) continue;
      races.push({
        id: 'r' + Date.now() + Math.floor(Math.random() * 1000),
        name: String(e.nome),
        date: e.data ? String(e.data) : null,
        distance: String(e.distancia || '-'),
        time_estimate: e.tempo_estimado ? String(e.tempo_estimado) : null,
        estimate_pace: e.pace_estimado ? String(e.pace_estimado) : null,
      });
      criadas++;
    }
  }
  if (atualizadas || criadas) setRaces(races);
  return { atualizadas, criadas };
}

function toast(msg, kind = '') {
